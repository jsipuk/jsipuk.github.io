<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pokémon Flappy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  display:flex;justify-content:center;align-items:center;
  min-height:100svh;min-height:100vh;
  font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden;
  touch-action:none;
}
#wrap{
  position:relative;
  width:400px;height:600px;
  border-radius:14px;overflow:hidden;
  box-shadow:0 0 50px rgba(255,200,0,.3),0 0 100px rgba(200,0,0,.2);
  flex-shrink:0;
}
#gc{display:block;width:400px;height:600px;}
.ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:14px;
}
.ov.hide{display:none;}

/* START */
#s-start{
  background:linear-gradient(160deg,rgba(135,206,235,.93) 0%,rgba(152,216,255,.93) 65%,rgba(144,238,144,.93) 100%);
}
#s-start h1{font-size:3rem;font-weight:900;color:#CC0000;text-shadow:3px 3px 0 #fff,5px 5px 0 #880000;line-height:1;}
#s-start h2{font-size:1.2rem;color:#fff;text-shadow:1px 1px 3px #000;margin-bottom:8px;font-style:italic;}
#preview-wrap{
  width:96px;height:96px;
  background:rgba(255,255,255,.25);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.6);
  margin:10px 0 6px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
#preview-canvas{display:block;}
#start-best{color:rgba(255,255,255,.9);font-size:.85rem;font-weight:700;text-shadow:1px 1px 2px #000;margin:4px 0 16px;}

/* SELECT */
#s-select{
  background:linear-gradient(160deg,rgba(135,206,235,.96) 0%,rgba(152,216,255,.96) 100%);
  padding:14px 14px 16px;gap:10px;
}
#s-select h3{color:#CC0000;font-size:1.35rem;font-weight:900;text-shadow:2px 2px 0 #fff;}
#char-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:9px;width:100%;
}
.cc{
  background:rgba(255,255,255,.75);
  border:3px solid rgba(200,200,200,.8);
  border-radius:10px;
  padding:5px 3px;
  cursor:pointer;text-align:center;
  transition:all .12s;user-select:none;
}
.cc:hover{transform:scale(1.07);border-color:#FFD700;}
.cc.sel{border-color:#CC0000;background:rgba(255,215,215,.95);}
.cc canvas{display:block;margin:0 auto;}
.cc span{display:block;font-size:.58rem;font-weight:700;color:#333;margin-top:3px;line-height:1.3;}
#s-select .brow{display:flex;gap:10px;margin-top:2px;}

/* GAMEOVER */
#s-gameover{background:transparent;pointer-events:none;}
#go-box{
  background:rgba(255,255,255,.94);
  border-radius:18px;padding:20px 30px;
  text-align:center;
  box-shadow:0 6px 28px rgba(0,0,0,.4);
  pointer-events:all;
  border:4px solid #CC0000;
}
#go-box h2{font-size:2.2rem;font-weight:900;color:#CC0000;text-shadow:2px 2px 0 #880000;}
#go-box .sc{margin:10px 0 16px;color:#333;}
#go-box .sc p{font-size:1.1rem;margin:3px 0;}
#go-box .brow{display:flex;gap:10px;justify-content:center;}

/* BUTTONS */
.btn{
  padding:11px 22px;border:none;border-radius:24px;
  font-size:1rem;font-weight:800;cursor:pointer;
  transition:transform .1s,filter .1s;
  box-shadow:0 4px 0 rgba(0,0,0,.3);
  letter-spacing:.3px;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.3);}
.btn-r{background:#CC0000;color:#fff;}
.btn-r:hover{filter:brightness(1.15);}
.btn-b{background:#3B4CCA;color:#fff;}
.btn-b:hover{filter:brightness(1.15);}

@media(max-width:420px){
  #wrap{width:100vw;height:100svh;height:100vh;border-radius:0;}
  #gc{width:100%;height:100%;}
  body{align-items:stretch;}
  .ov{border-radius:0;}
}
@media(max-height:620px) and (orientation:portrait){
  #wrap{height:100svh;height:100vh;}
  #gc{height:100%;}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc" width="400" height="600"></canvas>

  <!-- START SCREEN -->
  <div id="s-start" class="ov">
    <h1>Pokémon</h1>
    <h2>Flappy Edition</h2>
    <div id="preview-wrap">
      <canvas id="preview-canvas" width="80" height="80"></canvas>
    </div>
    <div id="start-best">Best: 0</div>
    <button class="btn btn-r" id="btn-play">▶  Play!</button>
    <div style="height:10px"></div>
    <button class="btn btn-b" id="btn-to-sel">Choose Pokémon</button>
  </div>

  <!-- SELECT SCREEN -->
  <div id="s-select" class="ov hide">
    <h3>Choose Your Pokémon!</h3>
    <div id="char-grid"></div>
    <div class="brow">
      <button class="btn btn-r" id="btn-confirm">Confirm!</button>
      <button class="btn btn-b" id="btn-back">← Back</button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="s-gameover" class="ov hide">
    <div id="go-box">
      <h2>Oh no!</h2>
      <div class="sc">
        <p>Score: <strong id="go-score">0</strong></p>
        <p style="color:#888">Best: <strong id="go-best">0</strong></p>
      </div>
      <div class="brow">
        <button class="btn btn-r" id="btn-again">Try Again!</button>
        <button class="btn btn-b" id="btn-change">Change Pokémon</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── CHARACTER DRAWINGS ──────────────────────────────────────────────────────
// fn(ctx, cx, cy, sz, angle)  sz=diameter, angle=tilt radians (+=nose down)
// Scale factor: s = sz/40

function drawCharizard(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .35);

  // Wings — proper dragon wing shape with blue-purple membrane + fingered frame
  // Membrane fill
  ctx.fillStyle = '#5848B8';
  ctx.beginPath();
  ctx.moveTo(-s*4, s*2);
  ctx.lineTo(-s*8, -s*6);   ctx.lineTo(-s*22, -s*22);  // main tip
  ctx.lineTo(-s*17, -s*4);  ctx.lineTo(-s*20, s*4);    // lower finger
  ctx.lineTo(-s*4, s*5);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s*4, s*2);
  ctx.lineTo(s*8, -s*6);    ctx.lineTo(s*22, -s*22);
  ctx.lineTo(s*17, -s*4);   ctx.lineTo(s*20, s*4);
  ctx.lineTo(s*4, s*5);
  ctx.closePath(); ctx.fill();
  // Wing bone ridges (orange)
  ctx.strokeStyle = '#E05020'; ctx.lineWidth = s*2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*5, s*3); ctx.lineTo(-s*22, -s*22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s*5, s*3); ctx.lineTo(-s*20, s*5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*5, s*3); ctx.lineTo(s*22, -s*22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*5, s*3); ctx.lineTo(s*20, s*5); ctx.stroke();
  ctx.lineCap = 'butt';

  // Body — orange
  ctx.fillStyle = '#FF7038';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*11,s*15,0,0,Math.PI*2); ctx.fill();
  // Large cream belly
  ctx.fillStyle = '#FFDB90';
  ctx.beginPath(); ctx.ellipse(s*1,s*7,s*7.5,s*11,0,0,Math.PI*2); ctx.fill();
  // Belly ridge lines
  ctx.strokeStyle = 'rgba(200,140,60,.35)'; ctx.lineWidth = s*1.2;
  for (let i=0;i<3;i++){ctx.beginPath();ctx.arc(s,s*3+i*s*4.5,s*6,-.4,Math.PI+.4);ctx.stroke();}

  // Tail with layered flame
  ctx.fillStyle = '#FF7038';
  ctx.beginPath(); ctx.moveTo(s*5,s*17); ctx.quadraticCurveTo(s*19,s*20,s*16,s*30); ctx.quadraticCurveTo(s*9,s*23,s*4,s*17); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#FF3300'; ctx.beginPath(); ctx.arc(s*16,s*29,s*5.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF9900'; ctx.beginPath(); ctx.arc(s*16,s*28,s*3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFEE20'; ctx.beginPath(); ctx.arc(s*15,s*27,s*1.8,0,Math.PI*2); ctx.fill();

  // Neck
  ctx.fillStyle='#FF7038';
  ctx.beginPath(); ctx.ellipse(0,-s*3,s*6,s*7,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(0,-s*14,s*10,0,Math.PI*2); ctx.fill();
  // Snout
  ctx.beginPath(); ctx.ellipse(s*4,-s*13,s*5,s*3.5,.12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#C84010';
  ctx.beginPath(); ctx.arc(s*3,-s*12.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6,-s*12.5,s*1.1,0,Math.PI*2); ctx.fill();

  // Two back-swept horns
  ctx.fillStyle='#D8A020';
  ctx.beginPath(); ctx.moveTo(-s*5,-s*22); ctx.lineTo(-s*10,-s*32); ctx.lineTo(-s*1,-s*23); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*3,-s*22); ctx.lineTo(s*7,-s*31); ctx.lineTo(s*1,-s*23); ctx.closePath(); ctx.fill();

  // Teal eyes (Charizard's signature eye colour)
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-s*4,-s*16,s*3.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*3,-s*16,s*3.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#12A890';
  ctx.beginPath(); ctx.arc(-s*4,-s*16,s*2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*3,-s*16,s*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-s*3.5,-s*16.5,s*.9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*3.5,-s*16.5,s*.9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-s*2.8,-s*17.2,s*.7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.2,-s*17.2,s*.7,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawBulbasaur(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .18);

  // HUGE bulb — Bulbasaur's defining feature
  // Outer dark green bulb
  ctx.fillStyle = '#1E5C1E';
  ctx.beginPath(); ctx.ellipse(-s*2,-s*14,s*11,s*15,-.08,0,Math.PI*2); ctx.fill();
  // Mid-green layer
  ctx.fillStyle = '#3A8030';
  ctx.beginPath(); ctx.ellipse(-s*2,-s*16,s*7.5,s*10,0,0,Math.PI*2); ctx.fill();
  // Bright top centre
  ctx.fillStyle = '#5AAA40';
  ctx.beginPath(); ctx.ellipse(-s*2,-s*19,s*4,s*5,0,0,Math.PI*2); ctx.fill();
  // Five leaf tips radiating from top
  ctx.fillStyle = '#72C048';
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2 - Math.PI*.5;
    ctx.beginPath();
    ctx.ellipse(-s*2+Math.cos(a)*s*10, -s*24+Math.sin(a)*s*7, s*4.5, s*2.2, a, 0, Math.PI*2);
    ctx.fill();
  }

  // Round teal-green body (no visible neck)
  ctx.fillStyle = '#70C050';
  ctx.beginPath(); ctx.ellipse(s*1,s*5,s*14,s*14,0,0,Math.PI*2); ctx.fill();
  // Lighter underside
  ctx.fillStyle = '#98D870';
  ctx.beginPath(); ctx.ellipse(s*2,s*7,s*9,s*9,0,0,Math.PI*2); ctx.fill();
  // Dark teal spots — signature Bulbasaur markings
  ctx.fillStyle = '#3A7028';
  ctx.beginPath(); ctx.arc(-s*8,s*0,s*4.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*9,s*8,s*4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-s*1,s*12,s*3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-s*6,s*8,s*2.8,0,Math.PI*2); ctx.fill();

  // Head merges with body
  ctx.fillStyle = '#70C050';
  ctx.beginPath(); ctx.arc(s*2,-s*12,s*12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#88D060';
  ctx.beginPath(); ctx.arc(s*3,-s*14,s*8,0,Math.PI*2); ctx.fill();

  // Pointed triangular ears with dark interior
  ctx.fillStyle = '#58A038';
  ctx.beginPath(); ctx.moveTo(-s*6,-s*22); ctx.lineTo(-s*12,-s*31); ctx.lineTo(s*0,-s*23); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*9,-s*22); ctx.lineTo(s*15,-s*30); ctx.lineTo(s*11,-s*23); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2E6018';
  ctx.beginPath(); ctx.moveTo(-s*7,-s*23); ctx.lineTo(-s*11,-s*30); ctx.lineTo(-s*2,-s*24); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*10,-s*23); ctx.lineTo(s*14,-s*29); ctx.lineTo(s*11,-s*24); ctx.closePath(); ctx.fill();

  // Large red-brown eyes — Bulbasaur's iconic look
  ctx.fillStyle = '#C01818';
  ctx.beginPath(); ctx.arc(-s*2,-s*13,s*4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*7,-s*13,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*.8,-s*14.5,s*1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*8.2,-s*14.5,s*1.5,0,Math.PI*2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*2.5,-s*13.5,s*1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6.5,-s*13.5,s*1.2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawCharmander(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Tail + layered flame
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.moveTo(s*6,s*12); ctx.quadraticCurveTo(s*21,s*15,s*19,s*27); ctx.quadraticCurveTo(s*12,s*23,s*5,s*13); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#FF2800'; ctx.beginPath(); ctx.arc(s*19,s*26,s*6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF8000'; ctx.beginPath(); ctx.arc(s*19,s*25,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFE820'; ctx.beginPath(); ctx.arc(s*18,s*24,s*2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(s*17.5,s*23.5,s*.9,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*10,s*14,0,0,Math.PI*2); ctx.fill();
  // Large cream belly — very distinctive on Charmander
  ctx.fillStyle = '#FFE8A8';
  ctx.beginPath(); ctx.ellipse(s*1,s*6,s*7,s*10.5,0,0,Math.PI*2); ctx.fill();

  // Stubby arms
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.ellipse(-s*11,s*3,s*4.5,s*3,-.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*11,s*3,s*4.5,s*3,.4,0,Math.PI*2); ctx.fill();

  // Big round head (baby dino proportions — head ≈ body width)
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.arc(0,-s*13,s*13,0,Math.PI*2); ctx.fill();
  // Paler forehead
  ctx.fillStyle = '#FFA848';
  ctx.beginPath(); ctx.arc(-s*1,-s*16,s*8,0,Math.PI*2); ctx.fill();
  // Cream muzzle
  ctx.fillStyle = '#FFE8A8';
  ctx.beginPath(); ctx.ellipse(s*2,-s*11,s*7,s*5,.08,0,Math.PI*2); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#C85818';
  ctx.beginPath(); ctx.arc(s*0,-s*9.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*3.5,-s*9.5,s*1.1,0,Math.PI*2); ctx.fill();

  // Big cute eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*15,s*4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*15,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*15,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*15,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*3.2,-s*16.3,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.8,-s*16.3,s*1.1,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawSquirtle(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .2);

  // Brown shell — Squirtle's defining feature
  ctx.fillStyle = '#8C6020';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*15,s*17,0,0,Math.PI*2); ctx.fill();
  // Shell mid-tone ridge
  ctx.fillStyle = '#B07830';
  ctx.beginPath(); ctx.ellipse(-s*1,s*1,s*11,s*12,0,0,Math.PI*2); ctx.fill();
  // Hex grid
  ctx.strokeStyle = '#5A3808'; ctx.lineWidth = s*1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*12,s*5); ctx.lineTo(s*12,s*5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-s*10); ctx.lineTo(0,s*20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s*11,-s*3); ctx.lineTo(-s*4,s*19); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*11,-s*3); ctx.lineTo(s*4,s*19); ctx.stroke();
  ctx.lineCap = 'butt';

  // Light blue body over shell
  ctx.fillStyle = '#5888E8';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*10,s*13,0,0,Math.PI*2); ctx.fill();
  // Cream belly
  ctx.fillStyle = '#D0DDFF';
  ctx.beginPath(); ctx.ellipse(s*1,s*6,s*6.5,s*9,0,0,Math.PI*2); ctx.fill();

  // Squirtle's iconic curly/spiral tail
  ctx.strokeStyle = '#5888E8'; ctx.lineWidth = s*5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s*11,s*13);
  ctx.bezierCurveTo(s*25,s*9, s*27,s*24, s*19,s*27);
  ctx.bezierCurveTo(s*14,s*29, s*11,s*22, s*15,s*19);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Blue head
  ctx.fillStyle = '#5888E8';
  ctx.beginPath(); ctx.arc(0,-s*12,s*11,0,Math.PI*2); ctx.fill();
  // Round ear bumps (distinctive Squirtle feature)
  ctx.beginPath(); ctx.arc(-s*9,-s*19,s*4.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*9,-s*19,s*4.5,0,Math.PI*2); ctx.fill();
  // Pale face
  ctx.fillStyle = '#A0C0F8';
  ctx.beginPath(); ctx.ellipse(s*.5,-s*12,s*7.5,s*7,0,0,Math.PI*2); ctx.fill();

  // Large round eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*4,-s*13,s*4.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*13,s*4.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4,-s*13,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*13,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*2.8,-s*14.3,s*1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.2,-s*14.3,s*1.2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawPikachu(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Lightning bolt tail — brown/dark base, bright yellow zigzag
  ctx.fillStyle = '#7A4810';
  ctx.beginPath();
  ctx.moveTo(s*8,s*4); ctx.lineTo(s*16,-s*1); ctx.lineTo(s*13,s*6);
  ctx.lineTo(s*21,-s*1); ctx.lineTo(s*20,s*8); ctx.lineTo(s*11,s*11);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#F8D030';
  ctx.beginPath();
  ctx.moveTo(s*10,s*3); ctx.lineTo(s*18,-s*2); ctx.lineTo(s*15,s*5);
  ctx.lineTo(s*23,-s*2); ctx.lineTo(s*22,s*7); ctx.lineTo(s*13,s*10);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#C89008'; ctx.lineWidth=s*.8; ctx.stroke();

  // Chubby yellow body
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*12,s*14,0,0,Math.PI*2); ctx.fill();
  // Two brown horizontal back stripes (Pikachu's markings)
  ctx.fillStyle = '#7A4810';
  ctx.beginPath(); ctx.ellipse(s*8,-s*.5,s*5,s*2.8,.08,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*8,s*5,s*5,s*2.8,.08,0,Math.PI*2); ctx.fill();

  // Round yellow head
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.arc(0,-s*13,s*13,0,Math.PI*2); ctx.fill();

  // Tall pointed ears with black tips — the most iconic Pikachu feature
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.moveTo(-s*8,-s*23); ctx.lineTo(-s*13,-s*38); ctx.lineTo(-s*2,-s*24); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*7,-s*23); ctx.lineTo(s*11,-s*38); ctx.lineTo(s*2,-s*24); ctx.closePath(); ctx.fill();
  // Black tips (large, very visible)
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.moveTo(-s*10,-s*33); ctx.lineTo(-s*13,-s*38); ctx.lineTo(-s*5,-s*30); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*9,-s*33); ctx.lineTo(s*11,-s*38); ctx.lineTo(s*5,-s*30); ctx.closePath(); ctx.fill();
  // Pink inner ear lining
  ctx.fillStyle = '#FFAAAA';
  ctx.beginPath(); ctx.moveTo(-s*9,-s*25); ctx.lineTo(-s*11,-s*34); ctx.lineTo(-s*4,-s*25); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*8,-s*25); ctx.lineTo(s*10,-s*34); ctx.lineTo(s*3,-s*25); ctx.closePath(); ctx.fill();

  // Bright red cheek circles — Pikachu's most iconic feature
  ctx.fillStyle = '#E82020';
  ctx.beginPath(); ctx.ellipse(-s*9.5,-s*10,s*5.5,s*4.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*9.5,-s*10,s*5.5,s*4.5,0,0,Math.PI*2); ctx.fill();
  // Cheek shimmer
  ctx.fillStyle = 'rgba(255,180,180,.55)';
  ctx.beginPath(); ctx.arc(-s*9.5,-s*10,s*3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*9.5,-s*10,s*3,0,Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4,-s*15,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*15,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*2.8,-s*16.2,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.2,-s*16.2,s*1.1,0,Math.PI*2); ctx.fill();
  // Small black nose
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*.5,-s*11,s*1.1,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawDragonite(ctx, cx, cy, sz, angle) {
  // Dragonite — chubby orange dragon with comically small wings, cream belly,
  // two curved antennae and friendly light-blue eyes
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Small wings (too tiny for body — Dragonite's iconic joke)
  ctx.fillStyle = '#C8E4F8';
  ctx.beginPath();
  ctx.moveTo(-s*4,-s*2); ctx.lineTo(-s*19,-s*18); ctx.lineTo(-s*16,-s*4); ctx.lineTo(-s*4,s*4);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s*4,-s*2); ctx.lineTo(s*19,-s*18); ctx.lineTo(s*16,-s*4); ctx.lineTo(s*4,s*4);
  ctx.closePath(); ctx.fill();
  // Wing vein lines
  ctx.strokeStyle = '#88C4E8'; ctx.lineWidth = s*1.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*4,-s*1); ctx.lineTo(-s*19,-s*18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*4,-s*1); ctx.lineTo(s*19,-s*18); ctx.stroke();
  ctx.lineCap = 'butt';

  // Chunky orange body
  ctx.fillStyle = '#E88030';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*13,s*16,0,0,Math.PI*2); ctx.fill();
  // Large cream/yellow belly
  ctx.fillStyle = '#F8E880';
  ctx.beginPath(); ctx.ellipse(0,s*6,s*9,s*12.5,0,0,Math.PI*2); ctx.fill();

  // Short stumpy tail
  ctx.fillStyle = '#E88030';
  ctx.beginPath();
  ctx.moveTo(-s*7,s*17); ctx.quadraticCurveTo(-s*15,s*22,-s*11,s*28);
  ctx.quadraticCurveTo(-s*5,s*25,s*2,s*18); ctx.closePath(); ctx.fill();
  // Tail tip — slightly lighter
  ctx.fillStyle = '#F0A040';
  ctx.beginPath(); ctx.arc(-s*11,s*27,s*4,0,Math.PI*2); ctx.fill();

  // Round friendly head
  ctx.fillStyle = '#E88030';
  ctx.beginPath(); ctx.arc(0,-s*14,s*12,0,Math.PI*2); ctx.fill();
  // Cream face patch
  ctx.fillStyle = '#F8E880';
  ctx.beginPath(); ctx.ellipse(s*1,-s*13,s*8.5,s*7.5,0,0,Math.PI*2); ctx.fill();

  // Two curved antennae with ball tips — key Dragonite feature
  ctx.strokeStyle = '#D07020'; ctx.lineWidth = s*2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*5,-s*25); ctx.quadraticCurveTo(-s*9,-s*31,-s*8,-s*36); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*3,-s*25); ctx.quadraticCurveTo(s*6,-s*31,s*5,-s*36); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#D07020';
  ctx.beginPath(); ctx.arc(-s*8,-s*36,s*3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5,-s*36,s*3.5,0,Math.PI*2); ctx.fill();

  // Light blue friendly eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14,s*4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#50A0F8';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*3.3,-s*15.5,s*1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.7,-s*15.5,s*1,0,Math.PI*2); ctx.fill();

  // Small friendly smile
  ctx.strokeStyle = '#B06010'; ctx.lineWidth = s*1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(s*1,-s*10,s*3.5,.15,Math.PI-.15); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

function drawPidgey(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .3);

  // Spread tail fan
  ctx.fillStyle = '#C0B068';
  ctx.beginPath(); ctx.moveTo(-s*5,s*10); ctx.lineTo(-s*11,s*24); ctx.lineTo(-s*3,s*20); ctx.lineTo(0,s*26); ctx.lineTo(s*3,s*20); ctx.lineTo(s*11,s*24); ctx.lineTo(s*5,s*10); ctx.closePath(); ctx.fill();
  // Tail feather lines
  ctx.strokeStyle = '#907840'; ctx.lineWidth = s*1.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0,s*10); ctx.lineTo(-s*1,s*26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s*2,s*11); ctx.lineTo(-s*9,s*24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*2,s*11); ctx.lineTo(s*9,s*24); ctx.stroke();
  ctx.lineCap = 'butt';

  // Animated wing flap
  const flap = Math.sin(Date.now() * .013) * .45;
  ctx.fillStyle = '#C0A868';
  ctx.save(); ctx.translate(-s*9,0); ctx.rotate(-flap-.2);
  ctx.beginPath(); ctx.ellipse(0,0,s*17,s*7,-.2,0,Math.PI*2); ctx.fill();
  // Wing darker tip
  ctx.fillStyle = '#806030';
  ctx.beginPath(); ctx.ellipse(-s*12,0,s*6,s*4,-.2,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#C0A868';
  ctx.save(); ctx.translate(s*9,0); ctx.rotate(flap+.2);
  ctx.beginPath(); ctx.ellipse(0,0,s*17,s*7,.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#806030';
  ctx.beginPath(); ctx.ellipse(s*12,0,s*6,s*4,.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Round brown body
  ctx.fillStyle = '#B8A060';
  ctx.beginPath(); ctx.ellipse(0,s*4,s*9,s*13,0,0,Math.PI*2); ctx.fill();
  // Cream-buff breast (large)
  ctx.fillStyle = '#E8DCA0';
  ctx.beginPath(); ctx.ellipse(s*1,s*6,s*6,s*9,0,0,Math.PI*2); ctx.fill();

  // Round head
  ctx.fillStyle = '#B8A060';
  ctx.beginPath(); ctx.arc(0,-s*10,s*10,0,Math.PI*2); ctx.fill();
  // Crest — three feather points
  ctx.fillStyle = '#C8B870';
  ctx.beginPath(); ctx.moveTo(-s*4,-s*18); ctx.lineTo(-s*7,-s*28); ctx.lineTo(-s*1,-s*19); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*0,-s*19); ctx.lineTo(s*2,-s*30); ctx.lineTo(s*4,-s*19); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*4,-s*18); ctx.lineTo(s*8,-s*27); ctx.lineTo(s*6,-s*18); ctx.closePath(); ctx.fill();

  // Cream face
  ctx.fillStyle = '#EEE4A8';
  ctx.beginPath(); ctx.ellipse(s*1,-s*10,s*8,s*6.5,0,0,Math.PI*2); ctx.fill();
  // Brown eye-stripe — Pidgey's most distinctive marking
  ctx.fillStyle = '#705030';
  ctx.beginPath(); ctx.ellipse(s*1,-s*11.5,s*9,s*3,0,0,Math.PI*2); ctx.fill();
  // Cream cheek below stripe
  ctx.fillStyle = '#EEE4A8';
  ctx.beginPath(); ctx.ellipse(s*1,-s*8.5,s*7,s*4,0,0,Math.PI*2); ctx.fill();

  // Red-ruby eyes (inside stripe)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*3,-s*11.5,s*3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*11.5,s*3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C01818';
  ctx.beginPath(); ctx.arc(-s*3,-s*11.5,s*2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*11.5,s*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*2,-s*12.5,s*.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5,-s*12.5,s*.8,0,Math.PI*2); ctx.fill();

  // Short hooked beak (upper + lower)
  ctx.fillStyle = '#D09018';
  ctx.beginPath(); ctx.moveTo(s*7,-s*10); ctx.lineTo(s*16,-s*7.5); ctx.lineTo(s*14,-s*4.5); ctx.lineTo(s*7,-s*7); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#A07010';
  ctx.beginPath(); ctx.moveTo(s*7,-s*8); ctx.lineTo(s*15,-s*7.5); ctx.lineTo(s*14,-s*6); ctx.lineTo(s*7,-s*7); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawMagikarp(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .4);

  // Fan tail — bright red with yellow edge highlights
  ctx.fillStyle = '#CC1010';
  ctx.beginPath(); ctx.moveTo(-s*3,s*12); ctx.lineTo(-s*13,s*24); ctx.lineTo(-s*3,s*19); ctx.lineTo(-s*10,s*30); ctx.lineTo(0,s*22); ctx.lineTo(s*10,s*30); ctx.lineTo(s*3,s*19); ctx.lineTo(s*13,s*24); ctx.lineTo(s*3,s*12); ctx.closePath(); ctx.fill();
  // Tail ribs
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = s*1.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0,s*14); ctx.lineTo(0,s*28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s*1,s*14); ctx.lineTo(-s*9,s*29); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*1,s*14); ctx.lineTo(s*9,s*29); ctx.stroke();
  ctx.lineCap = 'butt';

  // Red body
  ctx.fillStyle = '#E81818';
  ctx.beginPath(); ctx.ellipse(0,s*2,s*12,s*14,0,0,Math.PI*2); ctx.fill();
  // Overlapping scale arcs
  ctx.fillStyle = '#C01010';
  for (let row=0;row<4;row++) for (let col=0;col<3;col++){
    ctx.beginPath(); ctx.arc(-s*7+col*s*7,-s*5+row*s*7,s*4,Math.PI,0); ctx.fill();
  }
  // Yellow scale highlights
  ctx.fillStyle = 'rgba(255,220,0,.3)';
  for (let row=0;row<4;row++) for (let col=0;col<3;col++){
    ctx.beginPath(); ctx.arc(-s*7+col*s*7,-s*5+row*s*7,s*1.5,Math.PI,0); ctx.fill();
  }
  // Cream/silver belly
  ctx.fillStyle = '#FFE8E8';
  ctx.beginPath(); ctx.ellipse(s*2,s*3,s*7.5,s*11,0,0,Math.PI*2); ctx.fill();

  // Pectoral fins (yellow-gold)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.moveTo(-s*10,-s*1); ctx.lineTo(-s*22,-s*11); ctx.lineTo(-s*13,s*7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*10,-s*1); ctx.lineTo(s*22,-s*11); ctx.lineTo(s*13,s*7); ctx.closePath(); ctx.fill();
  // Dorsal fin
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.moveTo(-s*5,-s*13); ctx.lineTo(-s*6,-s*24); ctx.lineTo(s*5,-s*24); ctx.lineTo(s*5,-s*13); ctx.closePath(); ctx.fill();

  // Red head
  ctx.fillStyle = '#E81818';
  ctx.beginPath(); ctx.arc(0,-s*14,s*12,0,Math.PI*2); ctx.fill();

  // Four dramatic gold whiskers — Magikarp's signature
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = s*3; ctx.lineCap = 'round';
  // Upper pair (sweep upward and outward)
  ctx.beginPath(); ctx.moveTo(-s*3,-s*18); ctx.bezierCurveTo(-s*10,-s*26,-s*18,-s*24,-s*22,-s*20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*3,-s*18); ctx.bezierCurveTo(s*10,-s*26,s*18,-s*24,s*22,-s*20); ctx.stroke();
  // Lower pair (droop slightly outward — barbels)
  ctx.beginPath(); ctx.moveTo(-s*4,-s*15); ctx.bezierCurveTo(-s*11,-s*17,-s*18,-s*15,-s*21,-s*11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*4,-s*15); ctx.bezierCurveTo(s*11,-s*17,s*18,-s*15,s*21,-s*11); ctx.stroke();
  ctx.lineCap = 'butt';

  // Very large bug-eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*4,-s*16,s*5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*16,s*5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4,-s*16,s*3.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4,-s*16,s*3.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*2.5,-s*17.5,s*1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.5,-s*17.5,s*1.3,0,Math.PI*2); ctx.fill();

  // Big exaggerated pout-lips
  ctx.fillStyle = '#FF8888';
  ctx.beginPath(); ctx.ellipse(0,-s*9,s*7,s*4.5,0,0,Math.PI); ctx.fill();
  ctx.strokeStyle='#CC4040'; ctx.lineWidth=s*2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-s*7,-s*9); ctx.lineTo(s*7,-s*9); ctx.stroke();
  ctx.lineCap='butt';

  ctx.restore();
}

// ─── CHARACTER REGISTRY ──────────────────────────────────────────────────────

const CHARS = [
  { id:'charizard',  name:'Charizard',  col:'#FF6B35', draw:drawCharizard  },
  { id:'bulbasaur',  name:'Bulbasaur',  col:'#78C850', draw:drawBulbasaur  },
  { id:'charmander', name:'Charmander', col:'#F08030', draw:drawCharmander },
  { id:'squirtle',   name:'Squirtle',   col:'#6890F0', draw:drawSquirtle   },
  { id:'pikachu',    name:'Pikachu',    col:'#F8D030', draw:drawPikachu    },
  { id:'dragonite',  name:'Dragonite',  col:'#E88030', draw:drawDragonite  },
  { id:'pidgey',     name:'Pidgey',     col:'#A8A878', draw:drawPidgey     },
  { id:'magikarp',   name:'Magikarp',   col:'#F03030', draw:drawMagikarp   },
];

// ─── CANVAS & STATE ───────────────────────────────────────────────────────────

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const CW = 400, CH = 600;

let selectedChar = CHARS[0];
let score = 0;
let bestScore = parseInt(localStorage.getItem('pkflap_best') || '0');
let gamePhase = 'idle'; // 'idle' | 'playing' | 'dead'

// Bird
const BIRD_X = 85;
const BIRD_R = 22;
const GRAVITY = 0.35;   // gentle — floaty fall without being sluggish
const FLAP_V  = -6.8;   // moderate — less height than original, still responsive

let bird = { y:CH/2, vy:0, angle:0 };

// Pipes
const PIPE_W = 58;
let pipes = [];
let pipeTimer = 0;

// Ground
const GH = 58;
let groundX = 0;

// Clouds
let clouds = [
  {x:80, y:75, w:90, spd:.4},
  {x:265,y:130,w:70, spd:.35},
  {x:165,y:48, w:110,spd:.5},
];

// Butterfree flying the opposite direction to the game scroll
let bgFlyer = { x: 200, baseY: 152 };

// ─── DIFFICULTY ───────────────────────────────────────────────────────────────

function diff() {
  const t = Math.min(score, 50);
  return {
    speed:  2.0 + t * 0.055,
    gap:    Math.max(105, 170 - t * 1.3),
    spawn:  Math.max(58, 95 - t * 0.75),
  };
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────

function resetGame() {
  bird = { y:CH/2, vy:0, angle:0 };
  pipes = [];
  pipeTimer = 0;
  groundX = 0;
  score = 0;
  gamePhase = 'idle';
}

function flap() {
  if (gamePhase === 'idle') gamePhase = 'playing';
  if (gamePhase !== 'dead') bird.vy = FLAP_V;
}

function update(dt) {
  const d = diff();
  clouds.forEach(c => { c.x -= c.spd * dt; if (c.x + c.w < 0) c.x = CW + c.w; });
  bgFlyer.x += 0.55 * dt; if (bgFlyer.x > CW + 60) bgFlyer.x = -60;

  if (gamePhase !== 'playing') {
    if (gamePhase === 'idle') { bird.y = CH/2 + Math.sin(Date.now()*.002)*12; bird.angle = 0; }
    return;
  }

  bird.vy   += GRAVITY * dt;
  bird.vy    = Math.min(bird.vy, 9);   // terminal velocity — stops runaway drops
  bird.y    += bird.vy * dt;
  bird.angle = Math.atan2(bird.vy, 9) * .65;
  groundX    = (groundX - d.speed * dt) % 40;

  pipeTimer += dt;
  if (pipeTimer >= d.spawn) {
    pipeTimer = 0;
    const minGap = 70, maxGap = CH - GH - d.gap - 70;
    pipes.push({ x: CW + 20, gy: minGap + Math.random() * (maxGap - minGap), gap: d.gap, scored: false });
  }

  for (const p of pipes) {
    p.x -= d.speed * dt;
    if (!p.scored && p.x + PIPE_W < BIRD_X) {
      p.scored = true; score++;
      if (score > bestScore) { bestScore = score; localStorage.setItem('pkflap_best', bestScore); }
    }
  }
  pipes = pipes.filter(p => p.x > -PIPE_W - 20);

  if (bird.y - BIRD_R < 0) { bird.y = BIRD_R; bird.vy = Math.max(0, bird.vy); }
  if (bird.y + BIRD_R > CH - GH) { die(); return; }

  const FG = 5;
  for (const p of pipes) {
    if (BIRD_X + BIRD_R - FG > p.x && BIRD_X - BIRD_R + FG < p.x + PIPE_W) {
      if (bird.y - BIRD_R + FG < p.gy || bird.y + BIRD_R - FG > p.gy + p.gap) { die(); return; }
    }
  }
}

function die() {
  gamePhase = 'dead'; bird.vy = -5;
  setTimeout(() => {
    document.getElementById('go-score').textContent = score;
    document.getElementById('go-best').textContent = bestScore;
    showScreen('gameover');
  }, 700);
}

// ─── RENDERING ────────────────────────────────────────────────────────────────

function render() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,CH);
  sky.addColorStop(0,'#4899D8'); sky.addColorStop(.5,'#98D4F8'); sky.addColorStop(1,'#C8EEBB');
  ctx.fillStyle = sky; ctx.fillRect(0,0,CW,CH);

  drawSun();
  drawMountains();
  clouds.forEach(c => drawCloud(c.x, c.y, c.w));
  drawBgButterfree(bgFlyer.x, bgFlyer.baseY + Math.sin(Date.now() * .0009) * 14);
  pipes.forEach(p => drawPipe(p));
  drawGround();

  selectedChar.draw(ctx, BIRD_X, bird.y, BIRD_R * 2, bird.angle);

  if (gamePhase === 'playing' || gamePhase === 'dead') drawScoreHUD();
  if (gamePhase === 'idle') drawTapHint();
}

// ─── SUN ─────────────────────────────────────────────────────────────────────

function drawSun() {
  const sx = CW - 60, sy = 58;
  // Rotating rays
  ctx.strokeStyle = 'rgba(255,230,60,.65)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  const rot = Date.now() * .0003;
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4 + rot;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a)*25, sy + Math.sin(a)*25);
    ctx.lineTo(sx + Math.cos(a)*38, sy + Math.sin(a)*38);
    ctx.stroke();
  }
  ctx.lineCap = 'butt';
  // Glow halo
  const grd = ctx.createRadialGradient(sx,sy,10, sx,sy,32);
  grd.addColorStop(0,'rgba(255,240,80,.55)'); grd.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(sx,sy,32,0,Math.PI*2); ctx.fill();
  // Sun disc
  ctx.fillStyle = '#FFE830'; ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF260'; ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.fill();
}

// ─── MOUNTAINS ───────────────────────────────────────────────────────────────

function drawMountains() {
  // Far layer — pale blue-violet peaks
  ctx.fillStyle = 'rgba(160,168,210,.65)';
  ctx.beginPath(); ctx.moveTo(0,CH-GH);
  ctx.lineTo(0,275); ctx.lineTo(35,225); ctx.lineTo(65,255); ctx.lineTo(100,200);
  ctx.lineTo(130,240); ctx.lineTo(160,190); ctx.lineTo(195,230); ctx.lineTo(225,185);
  ctx.lineTo(255,220); ctx.lineTo(285,195); ctx.lineTo(315,235); ctx.lineTo(348,185);
  ctx.lineTo(375,215); ctx.lineTo(400,200); ctx.lineTo(400,CH-GH);
  ctx.closePath(); ctx.fill();
  // Snow caps
  ctx.fillStyle = 'rgba(240,245,255,.7)';
  const peaks = [[35,225],[100,200],[160,190],[225,185],[285,195],[348,185]];
  peaks.forEach(([px,py]) => {
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-14,py+22); ctx.lineTo(px+14,py+22); ctx.closePath(); ctx.fill();
  });

  // Near layer — rounded green hills
  ctx.fillStyle = 'rgba(100,170,100,.6)';
  ctx.beginPath(); ctx.moveTo(0,CH-GH);
  ctx.quadraticCurveTo(40,310, 80,330);
  ctx.quadraticCurveTo(130,285, 180,315);
  ctx.quadraticCurveTo(230,275, 280,308);
  ctx.quadraticCurveTo(330,280, 380,305);
  ctx.lineTo(400,320); ctx.lineTo(400,CH-GH); ctx.lineTo(0,CH-GH);
  ctx.closePath(); ctx.fill();

  // Trees on hills — small stylised firs
  const trees = [[55,328],[120,308],[210,310],[300,300],[365,315]];
  trees.forEach(([tx,ty]) => drawTree(tx, ty));

  // Pokémon Center on the hill
  drawPokeCenter();

  // Wild Oddish peeking above the grass line
  drawOddish(92, CH - GH);
  drawOddish(305, CH - GH);
}

function drawTree(tx, ty) {
  ctx.fillStyle = 'rgba(50,120,50,.7)';
  // Three layered triangles (fir tree silhouette)
  ctx.beginPath(); ctx.moveTo(tx,ty-28); ctx.lineTo(tx-12,ty-8); ctx.lineTo(tx+12,ty-8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(tx,ty-18); ctx.lineTo(tx-14,ty-2); ctx.lineTo(tx+14,ty-2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(tx,ty-8); ctx.lineTo(tx-10,ty+6); ctx.lineTo(tx+10,ty+6); ctx.closePath(); ctx.fill();
  // Trunk
  ctx.fillStyle = 'rgba(100,60,20,.6)';
  ctx.fillRect(tx-3, ty+5, 6, 8);
}

// ─── CLOUD ────────────────────────────────────────────────────────────────────

function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,.84)';
  ctx.beginPath(); ctx.arc(x,        y,    w*.28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.28,  y-w*.12,w*.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.52,  y,    w*.23, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.18,  y+w*.06,w*.18,0, Math.PI*2); ctx.fill();
}

// ─── PIPES ───────────────────────────────────────────────────────────────────

function drawPipe(p) {
  const capH = 18, capX = p.x - 5, capW = PIPE_W + 10;

  // Top pipe body
  ctx.fillStyle = '#2A8A45';
  ctx.fillRect(p.x, 0, PIPE_W, p.gy - capH);
  ctx.fillStyle = '#38A858';
  ctx.fillRect(capX, p.gy - capH, capW, capH);
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.fillRect(p.x+5, 0, 8, p.gy - capH);
  ctx.fillStyle = '#1A6030';
  ctx.fillRect(p.x, 0, 4, p.gy - capH);
  ctx.fillRect(capX, p.gy-capH, 4, capH);
  // Leaf tufts on top pipe cap
  drawPipeLeaves(p.x + PIPE_W/2, p.gy - capH, false);

  // Bottom pipe body
  const by = p.gy + p.gap, bh = CH - GH - by;
  ctx.fillStyle = '#2A8A45';
  ctx.fillRect(p.x, by + capH, PIPE_W, bh - capH);
  ctx.fillStyle = '#38A858';
  ctx.fillRect(capX, by, capW, capH);
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.fillRect(p.x+5, by+capH, 8, bh-capH);
  ctx.fillStyle = '#1A6030';
  ctx.fillRect(p.x, by+capH, 4, bh-capH);
  ctx.fillRect(capX, by, 4, capH);
  // Leaf tufts on bottom pipe cap
  drawPipeLeaves(p.x + PIPE_W/2, by, true);
}

function drawPipeLeaves(cx, cy, flipped) {
  const dir = flipped ? 1 : -1;
  ctx.fillStyle = '#228838';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(cx + i * 14, cy + dir * 10, 7, 12, i * .4, 0, Math.PI*2);
    ctx.fill();
  }
  // Lighter vein on each leaf
  ctx.fillStyle = '#44AA55';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(cx + i * 14, cy + dir * 10, 3, 7, i * .4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── GROUND ───────────────────────────────────────────────────────────────────

function drawGround() {
  // Tall grass blades just above ground (Pokémon-style!)
  const grassY = CH - GH;
  ctx.fillStyle = '#3A9818';
  for (let x = (groundX * 1.2) % 20 - 20; x < CW + 20; x += 14) {
    // Left-leaning blade
    ctx.beginPath();
    ctx.moveTo(x, grassY);
    ctx.quadraticCurveTo(x - 7, grassY - 18, x - 4, grassY - 30);
    ctx.quadraticCurveTo(x + 2, grassY - 18, x + 5, grassY);
    ctx.fill();
    // Right-leaning blade
    ctx.beginPath();
    ctx.moveTo(x + 7, grassY);
    ctx.quadraticCurveTo(x + 14, grassY - 15, x + 10, grassY - 26);
    ctx.quadraticCurveTo(x + 5, grassY - 15, x + 3, grassY);
    ctx.fill();
  }
  // Lighter tall grass layer
  ctx.fillStyle = '#58BC28';
  for (let x = (groundX * .9) % 24 - 24; x < CW + 24; x += 18) {
    ctx.beginPath();
    ctx.moveTo(x + 4, grassY);
    ctx.quadraticCurveTo(x - 3, grassY - 20, x + 0, grassY - 32);
    ctx.quadraticCurveTo(x + 6, grassY - 20, x + 8, grassY);
    ctx.fill();
  }

  // Dirt
  ctx.fillStyle = '#8B6914'; ctx.fillRect(0, grassY, CW, GH);
  // Grass strip
  ctx.fillStyle = '#4A8A20'; ctx.fillRect(0, grassY, CW, 14);
  // Ground tufts
  ctx.fillStyle = '#3A7A10';
  for (let x = groundX; x < CW + 40; x += 40) {
    ctx.beginPath(); ctx.arc(x, grassY+7, 11, Math.PI, 0); ctx.fill();
  }
  // Dirt texture
  ctx.fillStyle = '#7A5A0A';
  for (let x = groundX+2; x < CW + 40; x += 40) {
    ctx.fillRect(x, grassY+16, 20, 5);
    ctx.fillRect(x+22, grassY+26, 14, 4);
  }
}

// ─── POKÉMON CENTER ──────────────────────────────────────────────────────────

function drawPokeCenter() {
  const bx = 138, by = 279, bw = 72, bh = 50;
  ctx.save();
  ctx.globalAlpha = 0.82;

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,.14)';
  ctx.fillRect(bx + 3, by + 2, bw, 6);

  // Walls
  ctx.fillStyle = '#E8E8F2';
  ctx.fillRect(bx, by - bh, bw, bh);

  // Peaked roof
  ctx.fillStyle = '#CC3030';
  ctx.beginPath();
  ctx.moveTo(bx - 5, by - bh);
  ctx.lineTo(bx + bw / 2, by - bh - 28);
  ctx.lineTo(bx + bw + 5, by - bh);
  ctx.closePath(); ctx.fill();

  // Roof underside trim
  ctx.fillStyle = '#AA2020';
  ctx.fillRect(bx - 6, by - bh - 2, bw + 12, 4);

  // Globe at roof peak
  ctx.fillStyle = '#DD4040';
  ctx.beginPath(); ctx.arc(bx + bw / 2, by - bh - 30, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FF8888';
  ctx.beginPath(); ctx.arc(bx + bw / 2 - 1.5, by - bh - 32, 2, 0, Math.PI * 2); ctx.fill();

  // Red cross on wall
  const cx = bx + bw / 2, cy = by - bh + 10;
  ctx.fillStyle = '#CC3030';
  ctx.fillRect(cx - 3, cy, 6, 16);
  ctx.fillRect(cx - 9, cy + 5, 18, 6);

  // Windows
  ctx.fillStyle = 'rgba(160,215,245,.75)';
  ctx.fillRect(bx + 6, by - bh + 12, 16, 13);
  ctx.fillRect(bx + bw - 22, by - bh + 12, 16, 13);
  ctx.strokeStyle = 'rgba(110,165,210,.85)'; ctx.lineWidth = 1;
  ctx.strokeRect(bx + 6, by - bh + 12, 16, 13);
  ctx.strokeRect(bx + bw - 22, by - bh + 12, 16, 13);
  ctx.beginPath();
  ctx.moveTo(bx + 14, by - bh + 12); ctx.lineTo(bx + 14, by - bh + 25);
  ctx.moveTo(bx + bw - 14, by - bh + 12); ctx.lineTo(bx + bw - 14, by - bh + 25);
  ctx.stroke();

  // Door
  ctx.fillStyle = 'rgba(130,198,242,.82)';
  ctx.fillRect(cx - 9, by - 20, 18, 20);
  ctx.strokeStyle = 'rgba(85,148,198,.88)'; ctx.lineWidth = 1;
  ctx.strokeRect(cx - 9, by - 20, 18, 20);
  ctx.beginPath(); ctx.moveTo(cx, by - 20); ctx.lineTo(cx, by); ctx.stroke();

  // Building outline
  ctx.strokeStyle = 'rgba(180,175,200,.4)'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by - bh, bw, bh);

  ctx.restore();
}

// ─── WILD ODDISH ─────────────────────────────────────────────────────────────

function drawOddish(ox, oy) {
  // oy = ground line; body and leaves peek above it
  ctx.save();
  ctx.globalAlpha = 0.76;
  const r = 10;

  // Leaves behind body
  ctx.fillStyle = '#3A9030';
  ctx.beginPath(); ctx.ellipse(ox,     oy - r * 2.5, 3.5, 9,    0,    0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ox - 7, oy - r * 2.0, 3,   8, -0.5,   0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ox + 7, oy - r * 2.0, 3,   8,  0.5,   0, Math.PI * 2); ctx.fill();

  // Round body
  ctx.fillStyle = '#4858A8';
  ctx.beginPath(); ctx.arc(ox, oy - r, r, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(ox - 3.5, oy - r - 1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + 3.5, oy - r - 1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#202038';
  ctx.beginPath(); ctx.arc(ox - 3.5, oy - r - 1, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + 3.5, oy - r - 1, 1.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── BACKGROUND BUTTERFREE ───────────────────────────────────────────────────

function drawBgButterfree(x, y) {
  ctx.save();
  ctx.globalAlpha = 0.50;
  const t = Date.now() * 0.009;
  const liftU = Math.max(0,  Math.sin(t)) * 10;
  const liftD = Math.max(0, -Math.sin(t)) * 6;

  // Upper wings
  ctx.fillStyle = '#E8ECF8';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x - 18, y - 13 - liftU, x - 24, y - 2);
  ctx.quadraticCurveTo(x - 13, y + 6, x, y);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + 18, y - 13 - liftU, x + 24, y - 2);
  ctx.quadraticCurveTo(x + 13, y + 6, x, y);
  ctx.fill();

  // Lower wings
  ctx.fillStyle = '#C0CAEE';
  ctx.beginPath();
  ctx.moveTo(x - 3, y + 3);
  ctx.quadraticCurveTo(x - 16, y + 7 + liftD, x - 18, y + 15);
  ctx.quadraticCurveTo(x - 9, y + 17, x - 3, y + 8);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 3, y + 3);
  ctx.quadraticCurveTo(x + 16, y + 7 + liftD, x + 18, y + 15);
  ctx.quadraticCurveTo(x + 9, y + 17, x + 3, y + 8);
  ctx.fill();

  // Body
  ctx.fillStyle = '#8888A0';
  ctx.beginPath(); ctx.ellipse(x, y + 5, 3, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Antennae
  ctx.strokeStyle = '#606075'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - 1, y); ctx.lineTo(x - 8, y - 11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 1, y); ctx.lineTo(x + 8, y - 11); ctx.stroke();
  ctx.fillStyle = '#606075';
  ctx.beginPath(); ctx.arc(x - 8, y - 11, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8, y - 11, 2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────

function drawScoreHUD() {
  const txt = String(score), bw = Math.max(70, txt.length * 18 + 30);
  const bx = CW/2 - bw/2, by = 14;
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  roundRect(ctx, bx+2, by+3, bw, 36, 10); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.92)';
  roundRect(ctx, bx, by, bw, 36, 10); ctx.fill();
  ctx.fillStyle = '#222'; ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, CW/2, by+18);
}

function drawTapHint() {
  const alpha = .5 + .5 * Math.sin(Date.now() * .004);
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
  ctx.fillText('Tap / Space to start!', CW/2, CH/2 + 70);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────

function showScreen(name) {
  document.getElementById('s-start').classList.add('hide');
  document.getElementById('s-select').classList.add('hide');
  document.getElementById('s-gameover').classList.add('hide');
  if (name === 'start')    document.getElementById('s-start').classList.remove('hide');
  if (name === 'select')   document.getElementById('s-select').classList.remove('hide');
  if (name === 'gameover') document.getElementById('s-gameover').classList.remove('hide');
}

function startGame() { resetGame(); showScreen('game'); }

// ─── CHARACTER SELECT UI ──────────────────────────────────────────────────────

function buildCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'cc' + (ch.id === selectedChar.id ? ' sel' : '');
    const mc = document.createElement('canvas');
    mc.width = 56; mc.height = 56;
    const mctx = mc.getContext('2d');
    mctx.fillStyle = ch.col + '28';
    mctx.beginPath(); mctx.arc(28,28,25,0,Math.PI*2); mctx.fill();
    ch.draw(mctx, 28, 28, 46, 0);
    const lbl = document.createElement('span');
    lbl.textContent = ch.name;
    card.appendChild(mc); card.appendChild(lbl);
    card.addEventListener('click', () => {
      document.querySelectorAll('.cc').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      selectedChar = CHARS.find(c => c.id === ch.id);
    });
    grid.appendChild(card);
  });
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────

const pCtx = document.getElementById('preview-canvas').getContext('2d');
function animPreview() {
  pCtx.clearRect(0,0,80,80);
  pCtx.fillStyle = selectedChar.col + '28';
  pCtx.beginPath(); pCtx.arc(40,40,36,0,Math.PI*2); pCtx.fill();
  selectedChar.draw(pCtx, 40, 40, 64, Math.sin(Date.now()*.002)*.2);
  document.getElementById('start-best').textContent = 'Best: ' + bestScore;
  requestAnimationFrame(animPreview);
}
animPreview();

// ─── EVENTS ──────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive:false });

document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-to-sel').addEventListener('click', () => { buildCharGrid(); showScreen('select'); });
document.getElementById('btn-confirm').addEventListener('click', startGame);
document.getElementById('btn-back').addEventListener('click', () => showScreen('start'));
document.getElementById('btn-again').addEventListener('click', startGame);
document.getElementById('btn-change').addEventListener('click', () => { buildCharGrid(); showScreen('select'); });

// ─── LOOP ────────────────────────────────────────────────────────────────────

let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 16.667, 3);
  lastTs = ts;
  update(dt); render();
  requestAnimationFrame(loop);
}
showScreen('start');
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
