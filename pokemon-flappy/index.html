<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pokémon Flappy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  display:flex;justify-content:center;align-items:center;
  min-height:100svh;min-height:100vh;
  font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden;
  touch-action:none;
}
#wrap{
  position:relative;
  /* Fallback sizing — JS replaces width/height immediately at runtime */
  width:min(400px,100vw);
  height:min(600px,100svh,150vw);
  height:min(600px,100vh,150vw);
  border-radius:14px;overflow:hidden;
  box-shadow:0 0 50px rgba(255,200,0,.3),0 0 100px rgba(200,0,0,.2);
  flex-shrink:0;
}
#gc{display:block;width:100%;height:100%;}
.ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:14px;
}
.ov.hide{display:none;}

/* START */
#s-start{
  background:linear-gradient(160deg,rgba(135,206,235,.93) 0%,rgba(152,216,255,.93) 65%,rgba(144,238,144,.93) 100%);
}
#s-start h1{font-size:3rem;font-weight:900;color:#CC0000;text-shadow:3px 3px 0 #fff,5px 5px 0 #880000;line-height:1;}
#s-start h2{font-size:1.2rem;color:#fff;text-shadow:1px 1px 3px #000;margin-bottom:8px;font-style:italic;}
#preview-wrap{
  width:96px;height:96px;
  background:rgba(255,255,255,.25);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.6);
  margin:10px 0 6px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
#preview-canvas{display:block;}
#start-best{color:rgba(255,255,255,.9);font-size:.85rem;font-weight:700;text-shadow:1px 1px 2px #000;margin:4px 0 16px;}

/* SELECT */
#s-select{
  background:linear-gradient(160deg,rgba(135,206,235,.96) 0%,rgba(152,216,255,.96) 100%);
  padding:14px 14px 16px;gap:10px;
}
#s-select h3{color:#CC0000;font-size:1.35rem;font-weight:900;text-shadow:2px 2px 0 #fff;}
#char-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:9px;width:100%;
}
.cc{
  background:rgba(255,255,255,.75);
  border:3px solid rgba(200,200,200,.8);
  border-radius:10px;
  padding:5px 3px;
  cursor:pointer;text-align:center;
  transition:all .12s;user-select:none;
}
.cc:hover{transform:scale(1.07);border-color:#FFD700;}
.cc.sel{border-color:#CC0000;background:rgba(255,215,215,.95);}
.cc canvas{display:block;margin:0 auto;}
.cc span{display:block;font-size:.68rem;font-weight:700;color:#333;margin-top:3px;line-height:1.3;}
#s-select .brow{display:flex;gap:10px;margin-top:2px;}

/* GAMEOVER */
#s-gameover{background:transparent;pointer-events:none;}
#go-box{
  background:rgba(255,255,255,.94);
  border-radius:18px;padding:20px 30px;
  text-align:center;
  box-shadow:0 6px 28px rgba(0,0,0,.4);
  pointer-events:all;
  border:4px solid #CC0000;
}
#go-box h2{font-size:2.2rem;font-weight:900;color:#CC0000;text-shadow:2px 2px 0 #880000;}
#go-box .sc{margin:10px 0 16px;color:#333;}
#go-box .sc p{font-size:1.1rem;margin:3px 0;}
#go-box .brow{display:flex;gap:10px;justify-content:center;}

/* BUTTONS */
.btn{
  padding:11px 22px;border:none;border-radius:24px;
  font-size:1rem;font-weight:800;cursor:pointer;
  transition:transform .1s,filter .1s;
  box-shadow:0 4px 0 rgba(0,0,0,.3);
  letter-spacing:.3px;
  white-space:nowrap;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.3);}
.btn-r{background:#CC0000;color:#fff;}
.btn-r:hover{filter:brightness(1.15);}
.btn-b{background:#3B4CCA;color:#fff;}
.btn-b:hover{filter:brightness(1.15);}

/* MUTE */
#btn-mute{
  position:absolute;top:8px;left:8px;z-index:30;
  width:44px;height:44px;border:none;border-radius:50%;
  background:rgba(255,255,255,.55);font-size:1.1rem;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:center;
}
#btn-mute:active{transform:scale(.9);}

/* MEDAL / NEW BEST */
#go-medal{font-size:2.6rem;line-height:1.1;}
#go-medal.hide,#go-newbest.hide{display:none;}
#go-newbest{
  display:inline-block;background:#FFD700;color:#7A4810;
  font-weight:900;font-size:.8rem;padding:3px 12px;border-radius:12px;
  margin-top:6px;letter-spacing:.5px;
  animation:pulse .9s infinite alternate;
}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}

@media(max-width:420px),(max-height:620px){
  #wrap{border-radius:0;}
  .ov{border-radius:0;}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc" width="400" height="600"></canvas>
  <button id="btn-mute" title="Sound on/off">🔊</button>

  <!-- START SCREEN -->
  <div id="s-start" class="ov">
    <h1>Pokémon</h1>
    <h2>Flappy Edition</h2>
    <div id="preview-wrap">
      <canvas id="preview-canvas" width="80" height="80"></canvas>
    </div>
    <div id="start-best">Best: 0</div>
    <button class="btn btn-r" id="btn-play">▶  Play!</button>
    <div style="height:10px"></div>
    <button class="btn btn-b" id="btn-to-sel">Choose Pokémon</button>
  </div>

  <!-- SELECT SCREEN -->
  <div id="s-select" class="ov hide">
    <h3>Choose Your Pokémon!</h3>
    <div id="char-grid"></div>
    <div class="brow">
      <button class="btn btn-r" id="btn-confirm">Confirm!</button>
      <button class="btn btn-b" id="btn-back">← Back</button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="s-gameover" class="ov hide">
    <div id="go-box">
      <h2>Oh no!</h2>
      <div id="go-medal" class="hide"></div>
      <div class="sc">
        <p>Score: <strong id="go-score">0</strong></p>
        <p style="color:#888">Best: <strong id="go-best">0</strong></p>
        <div id="go-newbest" class="hide">★ NEW BEST! ★</div>
      </div>
      <div class="brow">
        <button class="btn btn-r" id="btn-again">Try Again!</button>
        <button class="btn btn-b" id="btn-change">Change Pokémon</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── CHARACTER DRAWINGS ──────────────────────────────────────────────────────
// fn(ctx, cx, cy, sz, angle)  sz=diameter, angle=tilt radians (+=nose down)
// Scale factor: s = sz/40

function drawCharizard(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .35);

  // Two big bat wings sweeping up behind — teal membrane, orange leading bone
  // Far wing (darker)
  ctx.fillStyle = '#2E7E80';
  ctx.beginPath();
  ctx.moveTo(s*2, -s*2);
  ctx.lineTo(s*6, -s*26);
  ctx.quadraticCurveTo(s*12, -s*18, s*15, -s*20);
  ctx.quadraticCurveTo(s*13, -s*10, s*16, -s*9);
  ctx.quadraticCurveTo(s*9, -s*3, s*3, s*1);
  ctx.closePath(); ctx.fill();
  // Near wing
  ctx.fillStyle = '#3D9E9E';
  ctx.beginPath();
  ctx.moveTo(-s*2, -s*2);
  ctx.lineTo(-s*11, -s*31);
  ctx.quadraticCurveTo(-s*16, -s*21, -s*23, -s*23);
  ctx.quadraticCurveTo(-s*19, -s*12, -s*26, -s*10);
  ctx.quadraticCurveTo(-s*15, -s*3, -s*3, s*2);
  ctx.closePath(); ctx.fill();
  // Orange wing bones
  ctx.strokeStyle = '#E07030'; ctx.lineWidth = s*2.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*2, -s*1); ctx.lineTo(-s*11, -s*31); ctx.stroke();
  ctx.lineCap = 'butt';

  // Tail trailing behind with the iconic flame
  ctx.strokeStyle = '#F08030'; ctx.lineWidth = s*4.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*5, s*13); ctx.quadraticCurveTo(-s*16, s*20, -s*15, s*27); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#FF3300'; ctx.beginPath(); ctx.arc(-s*15, s*29, s*5.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF9900'; ctx.beginPath(); ctx.arc(-s*15, s*28, s*3.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFEE20'; ctx.beginPath(); ctx.arc(-s*14.6, s*27, s*1.8, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#F08030';
  ctx.beginPath(); ctx.ellipse(0, s*7, s*11, s*12.5, 0, 0, Math.PI*2); ctx.fill();
  // Cream belly with ridge lines
  ctx.fillStyle = '#FFDB90';
  ctx.beginPath(); ctx.ellipse(s*2.5, s*8.5, s*7, s*9.5, .05, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(200,140,60,.4)'; ctx.lineWidth = s*1.1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.arc(s*2.5, s*3 + i*s*4.5, s*5.5, .35, Math.PI - .35); ctx.stroke();
  }
  // Small arm
  ctx.fillStyle = '#F08030';
  ctx.beginPath(); ctx.ellipse(s*9, s*3, s*4, s*2.6, .5, 0, Math.PI*2); ctx.fill();

  // Long neck up to the head
  ctx.beginPath(); ctx.ellipse(s*3, -s*6, s*5.5, s*9, .15, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.ellipse(s*4, -s*16, s*8, s*7.5, 0, 0, Math.PI*2); ctx.fill();
  // Long snout
  ctx.beginPath(); ctx.ellipse(s*11, -s*14.5, s*5.5, s*4, .1, 0, Math.PI*2); ctx.fill();
  // Mouth line + nostril
  ctx.strokeStyle = '#B05010'; ctx.lineWidth = s*1.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(s*8, -s*12.5); ctx.lineTo(s*15.5, -s*13); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#B05010';
  ctx.beginPath(); ctx.arc(s*14.5, -s*16, s*.9, 0, Math.PI*2); ctx.fill();

  // Two horns swept back from the skull
  ctx.fillStyle = '#E8A040';
  ctx.beginPath(); ctx.moveTo(-s*1,-s*21); ctx.lineTo(-s*8,-s*29); ctx.lineTo(s*1,-s*18.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*4,-s*22); ctx.lineTo(s*0,-s*31); ctx.lineTo(s*6.5,-s*19.5); ctx.closePath(); ctx.fill();

  // Fierce teal eye with angled brow
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*6, -s*17.5, s*2.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#12A890';
  ctx.beginPath(); ctx.arc(s*6.3, -s*17.3, s*1.9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*6.6, -s*17.2, s*.95, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#C05818'; ctx.lineWidth = s*1.6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(s*2.5, -s*20.5); ctx.lineTo(s*9, -s*19.5); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

function drawBulbasaur(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .18);

  // Bulb riding on the back (upper-left, behind the body)
  ctx.fillStyle = '#2E8B45';
  ctx.beginPath(); ctx.ellipse(-s*9, -s*11, s*11, s*12, -.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#45A858';
  ctx.beginPath(); ctx.ellipse(-s*9, -s*13, s*7.5, s*8, -.1, 0, Math.PI*2); ctx.fill();
  // Leaf tips sprouting from the bulb
  ctx.fillStyle = '#2E8B45';
  ctx.beginPath(); ctx.ellipse(-s*9,  -s*24, s*3,   s*7,  .05, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-s*16, -s*20, s*2.6, s*6, -.7,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-s*2,  -s*20, s*2.6, s*6,  .7,  0, Math.PI*2); ctx.fill();

  // Wide squat teal body
  ctx.fillStyle = '#6FBFA0';
  ctx.beginPath(); ctx.ellipse(s*2, s*8, s*15, s*10.5, 0, 0, Math.PI*2); ctx.fill();
  // Stubby legs
  ctx.beginPath(); ctx.ellipse(s*11, s*15, s*5, s*4, .15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-s*8, s*15.5, s*5.5, s*4, -.1, 0, Math.PI*2); ctx.fill();

  // Big head, front-right
  ctx.beginPath(); ctx.ellipse(s*7, -s*7, s*13, s*11, .05, 0, Math.PI*2); ctx.fill();

  // Pointy ears with dark inner
  ctx.beginPath(); ctx.moveTo(-s*3,-s*14); ctx.lineTo(-s*7,-s*25); ctx.lineTo(s*3,-s*16.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*11,-s*15.5); ctx.lineTo(s*17,-s*24); ctx.lineTo(s*18,-s*12.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3E8E63';
  ctx.beginPath(); ctx.moveTo(-s*3.6,-s*15.5); ctx.lineTo(-s*6.2,-s*22.8); ctx.lineTo(s*.6,-s*16.8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*12.2,-s*15.8); ctx.lineTo(s*16,-s*21.8); ctx.lineTo(s*16.7,-s*13.8); ctx.closePath(); ctx.fill();

  // Darker green patch markings
  ctx.fillStyle = '#3E8E63';
  ctx.beginPath(); ctx.ellipse(-s*4, s*5,  s*3.4, s*2.6, .3,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*9,  s*12, s*3,   s*2.2, -.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*16, -s*1, s*2.6, s*2,   .4,  0, Math.PI*2); ctx.fill();

  // Big red eyes with white sclera + pupil + glint
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*1.5,-s*8, s*4.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*13,  -s*8, s*4.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#D43A3A';
  ctx.beginPath(); ctx.arc(s*2,  -s*7.8, s*3.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*12.5,-s*7.8, s*3.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*2.6, -s*7.6, s*1.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*11.9,-s*7.6, s*1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*3.3, -s*8.8, s*1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*12.6,-s*8.8, s*1, 0, Math.PI*2); ctx.fill();

  // Wide friendly mouth + nostrils
  ctx.strokeStyle = '#2E6B4F'; ctx.lineWidth = s*1.6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(s*7, -s*4, s*5.5, .25, Math.PI - .25); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#2E6B4F';
  ctx.beginPath(); ctx.arc(s*5.5, -s*2.2, s*.7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*8.5, -s*2.2, s*.7, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawCharmander(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Tail trailing behind with layered flame
  ctx.strokeStyle = '#F08828'; ctx.lineWidth = s*4.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*6, s*12); ctx.quadraticCurveTo(-s*17, s*18, -s*16, s*25); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle='#FF2800'; ctx.beginPath(); ctx.arc(-s*16,s*26,s*6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF8000'; ctx.beginPath(); ctx.arc(-s*16,s*25,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFE820'; ctx.beginPath(); ctx.arc(-s*15.6,s*24,s*2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(-s*15.4,s*23.5,s*.9,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.ellipse(0,s*6,s*10,s*13,0,0,Math.PI*2); ctx.fill();
  // Large cream belly — very distinctive on Charmander
  ctx.fillStyle = '#FFE8A8';
  ctx.beginPath(); ctx.ellipse(s*2,s*7,s*7,s*10,0,0,Math.PI*2); ctx.fill();

  // Stubby arm + leg
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.ellipse(s*10,s*4,s*4.5,s*3,.45,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*6,s*17,s*5,s*3.5,.15,0,Math.PI*2); ctx.fill();

  // Big round head (baby dino proportions — head ≈ body width)
  ctx.fillStyle = '#F08828';
  ctx.beginPath(); ctx.arc(s*1,-s*13,s*13,0,Math.PI*2); ctx.fill();

  // Big happy open mouth with cream muzzle
  ctx.fillStyle = '#FFE8A8';
  ctx.beginPath(); ctx.ellipse(s*4,-s*9,s*8,s*5.5,.08,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#A02818';
  ctx.beginPath(); ctx.ellipse(s*5,-s*8,s*5,s*3,.08,0,Math.PI); ctx.fill();
  ctx.fillStyle = '#FF8888';
  ctx.beginPath(); ctx.ellipse(s*5,-s*6.2,s*2.6,s*1.4,0,0,Math.PI); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#C85818';
  ctx.beginPath(); ctx.arc(s*2,-s*12.5,s*.9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.5,-s*12.5,s*.9,0,Math.PI*2); ctx.fill();

  // Big cute eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*3.5,-s*16,s*4.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6.5,-s*16.5,s*4.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2E78C8';
  ctx.beginPath(); ctx.arc(-s*3.2,-s*15.8,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6.2,-s*16.3,s*2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*2.9,-s*15.7,s*1.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.9,-s*16.2,s*1.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*2.1,-s*17,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6.8,-s*17.5,s*1.1,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawSquirtle(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .2);

  // Thick curly tail trailing behind, outlined so it pops against the sky
  ctx.strokeStyle = '#4E94BF'; ctx.lineWidth = s*7.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s*13, s*10);
  ctx.bezierCurveTo(-s*24, s*8, -s*24, -s*4, -s*16, -s*4);
  ctx.bezierCurveTo(-s*11, -s*4, -s*12, s*2, -s*16, s*1);
  ctx.stroke();
  ctx.strokeStyle = '#7EC4E6'; ctx.lineWidth = s*5;
  ctx.beginPath();
  ctx.moveTo(-s*13, s*10);
  ctx.bezierCurveTo(-s*24, s*8, -s*24, -s*4, -s*16, -s*4);
  ctx.bezierCurveTo(-s*11, -s*4, -s*12, s*2, -s*16, s*1);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Brown shell dome tucked behind the body
  ctx.fillStyle = '#A06B2A';
  ctx.beginPath(); ctx.ellipse(-s*4, s*5, s*11, s*11.5, .08, 0, Math.PI*2); ctx.fill();
  // Cream rim along the shell's lower edge
  ctx.strokeStyle = '#F2E3B8'; ctx.lineWidth = s*3.4;
  ctx.beginPath(); ctx.ellipse(-s*4, s*5, s*9.2, s*9.7, .08, Math.PI*.32, Math.PI*1.12); ctx.stroke();
  // Shell plate lines
  ctx.strokeStyle = '#6E4A18'; ctx.lineWidth = s*1.3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*14, s*4); ctx.lineTo(s*5, s*4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-s*4, -s*5.5); ctx.lineTo(-s*4, s*14.5); ctx.stroke();
  ctx.lineCap = 'butt';

  // Blue body overlapping the shell's front
  ctx.fillStyle = '#7EC4E6';
  ctx.beginPath(); ctx.ellipse(s*4, s*7, s*9, s*10.5, 0, 0, Math.PI*2); ctx.fill();
  // Little leg
  ctx.beginPath(); ctx.ellipse(s*8, s*16.5, s*5, s*3.5, .2, 0, Math.PI*2); ctx.fill();

  // Cream plastron (belly plate)
  ctx.fillStyle = '#F2E3B8';
  ctx.beginPath(); ctx.ellipse(s*6, s*9, s*5.5, s*7.5, .05, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#C8A86A'; ctx.lineWidth = s*1.1;
  ctx.beginPath(); ctx.moveTo(s*1, s*9); ctx.lineTo(s*11.5, s*9); ctx.stroke();

  // Big light-blue head, up front-right
  ctx.fillStyle = '#7EC4E6';
  ctx.beginPath(); ctx.ellipse(s*5, -s*9, s*12, s*11, 0, 0, Math.PI*2); ctx.fill();
  // Little arm
  ctx.beginPath(); ctx.ellipse(s*13, s*4.5, s*4.5, s*3, .55, 0, Math.PI*2); ctx.fill();

  // Big dark-mauve eyes (Squirtle's are purple-brown)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*0, -s*10.5, s*5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*11.5, -s*10.5, s*5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6B4A66';
  ctx.beginPath(); ctx.arc(s*.8, -s*10.3, s*3.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*10.7, -s*10.3, s*3.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*1.5, -s*10, s*1.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*10, -s*10, s*1.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*2.3, -s*11.6, s*1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*10.8, -s*11.6, s*1.2, 0, Math.PI*2); ctx.fill();

  // Cheerful little smile
  ctx.strokeStyle = '#2E5E78'; ctx.lineWidth = s*1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(s*6.5, -s*6.5, s*4.5, .35, Math.PI - .35); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

function drawPikachu(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Lightning bolt tail trailing behind
  ctx.fillStyle = '#7A4810';
  ctx.beginPath();
  ctx.moveTo(-s*9,s*6); ctx.lineTo(-s*16,s*1); ctx.lineTo(-s*13,s*8);
  ctx.lineTo(-s*22,s*2); ctx.lineTo(-s*21,-s*9); ctx.lineTo(-s*12,s*0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#F8D030';
  ctx.beginPath();
  ctx.moveTo(-s*10,s*4.5); ctx.lineTo(-s*15.5,s*1); ctx.lineTo(-s*13,s*6);
  ctx.lineTo(-s*20.6,s*.8); ctx.lineTo(-s*19.8,-s*7.5); ctx.lineTo(-s*12.4,-s*.4);
  ctx.closePath(); ctx.fill();

  // Chubby yellow body
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.ellipse(0,s*6,s*12,s*13,0,0,Math.PI*2); ctx.fill();
  // Two brown back stripes
  ctx.fillStyle = '#7A4810';
  ctx.beginPath(); ctx.ellipse(-s*8,s*1,s*4.5,s*2.4,-.35,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-s*7,s*7,s*4.5,s*2.4,-.25,0,Math.PI*2); ctx.fill();
  // Little arm
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.ellipse(s*9,s*6,s*4,s*2.6,.5,0,Math.PI*2); ctx.fill();

  // Round yellow head
  ctx.beginPath(); ctx.arc(s*1,-s*12,s*13,0,Math.PI*2); ctx.fill();

  // Two tall ears in a proper V, black top thirds
  ctx.fillStyle = '#F8D030';
  ctx.beginPath(); ctx.moveTo(-s*8,-s*20); ctx.quadraticCurveTo(-s*14,-s*28,-s*15,-s*36); ctx.quadraticCurveTo(-s*9,-s*31,-s*2,-s*23); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*8,-s*21); ctx.quadraticCurveTo(s*13,-s*29,s*16,-s*35); ctx.quadraticCurveTo(s*9,-s*32,s*3,-s*23.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.moveTo(-s*12.2,-s*29.5); ctx.quadraticCurveTo(-s*14,-s*32.5,-s*15,-s*36); ctx.quadraticCurveTo(-s*11.5,-s*33,-s*8.6,-s*29.6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*12,-s*29.8); ctx.quadraticCurveTo(s*14.3,-s*32.5,s*16,-s*35); ctx.quadraticCurveTo(s*11.8,-s*33.2,s*9.4,-s*29.8); ctx.closePath(); ctx.fill();

  // Bright red cheek circles
  ctx.fillStyle = '#E82020';
  ctx.beginPath(); ctx.ellipse(-s*7.5,-s*7.5,s*4.8,s*4.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*10.5,-s*7.5,s*4.8,s*4.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,180,180,.5)';
  ctx.beginPath(); ctx.arc(-s*7.5,-s*8.2,s*2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*10.5,-s*8.2,s*2.4,0,Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*2.5,-s*14,s*2.9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*6.5,-s*14,s*2.9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*1.5,-s*15,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*7.5,-s*15,s*1.1,0,Math.PI*2); ctx.fill();

  // Tiny nose + the classic "w" mouth
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*2,-s*10.5,s*.8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7A4810'; ctx.lineWidth = s*1.3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(s*.4,-s*8.6,s*1.8,.15,Math.PI-.4); ctx.stroke();
  ctx.beginPath(); ctx.arc(s*4,-s*8.6,s*1.8,.4,Math.PI-.15); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

function drawDragonite(ctx, cx, cy, sz, angle) {
  // Dragonite — chubby orange dragon with comically small wings, cream belly,
  // two curved antennae and friendly light-blue eyes
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .25);

  // Small teal wings (comically tiny for the body — Dragonite's iconic joke)
  ctx.fillStyle = '#3D9E9E';
  ctx.beginPath();
  ctx.moveTo(-s*4,-s*2); ctx.lineTo(-s*19,-s*18); ctx.lineTo(-s*16,-s*4); ctx.lineTo(-s*4,s*4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#52B8B0';
  ctx.beginPath();
  ctx.moveTo(s*4,-s*2); ctx.lineTo(s*19,-s*18); ctx.lineTo(s*16,-s*4); ctx.lineTo(s*4,s*4);
  ctx.closePath(); ctx.fill();
  // Orange wing bones
  ctx.strokeStyle = '#D07020'; ctx.lineWidth = s*1.6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*4,-s*1); ctx.lineTo(-s*19,-s*18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*4,-s*1); ctx.lineTo(s*19,-s*18); ctx.stroke();
  ctx.lineCap = 'butt';

  // Chunky orange body
  ctx.fillStyle = '#E88030';
  ctx.beginPath(); ctx.ellipse(0,s*5,s*13,s*16,0,0,Math.PI*2); ctx.fill();
  // Large cream belly with rib lines
  ctx.fillStyle = '#F5E6A8';
  ctx.beginPath(); ctx.ellipse(0,s*6,s*9,s*12.5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(190,140,60,.4)'; ctx.lineWidth = s*1.1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.arc(0, s*1 + i*s*4.5, s*7, .35, Math.PI - .35); ctx.stroke();
  }

  // Short stumpy tail
  ctx.fillStyle = '#E88030';
  ctx.beginPath();
  ctx.moveTo(-s*7,s*17); ctx.quadraticCurveTo(-s*15,s*22,-s*11,s*28);
  ctx.quadraticCurveTo(-s*5,s*25,s*2,s*18); ctx.closePath(); ctx.fill();
  // Tail tip — slightly lighter
  ctx.fillStyle = '#F0A040';
  ctx.beginPath(); ctx.arc(-s*11,s*27,s*4,0,Math.PI*2); ctx.fill();

  // Round friendly head
  ctx.fillStyle = '#E88030';
  ctx.beginPath(); ctx.arc(0,-s*14,s*12,0,Math.PI*2); ctx.fill();
  // Cream face patch
  ctx.fillStyle = '#F8E880';
  ctx.beginPath(); ctx.ellipse(s*1,-s*13,s*8.5,s*7.5,0,0,Math.PI*2); ctx.fill();

  // Two curved antennae with ball tips — key Dragonite feature
  ctx.strokeStyle = '#D07020'; ctx.lineWidth = s*2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s*5,-s*25); ctx.quadraticCurveTo(-s*9,-s*31,-s*8,-s*36); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*3,-s*25); ctx.quadraticCurveTo(s*6,-s*31,s*5,-s*36); ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.fillStyle = '#D07020';
  ctx.beginPath(); ctx.arc(-s*8,-s*36,s*3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5,-s*36,s*3.5,0,Math.PI*2); ctx.fill();

  // Light blue friendly eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14,s*4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14,s*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#50A0F8';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14,s*2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*4.5,-s*14.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*4.5,-s*14.5,s*1.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*3.3,-s*15.5,s*1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*5.7,-s*15.5,s*1,0,Math.PI*2); ctx.fill();

  // Small friendly smile
  ctx.strokeStyle = '#B06010'; ctx.lineWidth = s*1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(s*1,-s*10,s*3.5,.15,Math.PI-.15); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.restore();
}

function drawPidgey(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .3);

  // Tail feathers trailing behind
  ctx.fillStyle = '#8A6A3A';
  ctx.beginPath(); ctx.moveTo(-s*8,s*4); ctx.lineTo(-s*22,s*8); ctx.lineTo(-s*9,s*10) ; ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#A8854C';
  ctx.beginPath(); ctx.moveTo(-s*8,s*6); ctx.lineTo(-s*21,s*13); ctx.lineTo(-s*8,s*12); ctx.closePath(); ctx.fill();

  // Animated flapping wing (one, on the near side)
  const flap = Math.sin(Date.now() * .013) * .5;
  ctx.save(); ctx.translate(-s*2, s*1); ctx.rotate(-flap - .15);
  ctx.fillStyle = '#A8854C';
  ctx.beginPath(); ctx.ellipse(-s*8, -s*4, s*13, s*6, -.45, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8A6A3A';
  ctx.beginPath(); ctx.ellipse(-s*15, -s*9, s*6, s*4, -.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Plump brown body
  ctx.fillStyle = '#B59260';
  ctx.beginPath(); ctx.ellipse(0, s*5, s*13, s*12, 0, 0, Math.PI*2); ctx.fill();
  // Big cream breast
  ctx.fillStyle = '#F0E4BC';
  ctx.beginPath(); ctx.ellipse(s*5, s*8, s*8, s*9, .15, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#B59260';
  ctx.beginPath(); ctx.arc(s*4, -s*9, s*11, 0, Math.PI*2); ctx.fill();

  // Crest — swept-back tan feather tuft
  ctx.fillStyle = '#D9BC82';
  ctx.beginPath(); ctx.moveTo(s*8,-s*17); ctx.quadraticCurveTo(s*2,-s*27,-s*6,-s*27); ctx.quadraticCurveTo(-s*2,-s*21,s*0,-s*16); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*4,-s*18); ctx.quadraticCurveTo(-s*3,-s*24,-s*10,-s*22); ctx.quadraticCurveTo(-s*5,-s*17,-s*2,-s*14); ctx.closePath(); ctx.fill();

  // Cream lower face
  ctx.fillStyle = '#F0E4BC';
  ctx.beginPath(); ctx.ellipse(s*6, -s*5, s*8.5, s*6, .1, 0, Math.PI*2); ctx.fill();

  // Black eye mask angled across the face
  ctx.fillStyle = '#2A2018';
  ctx.beginPath(); ctx.ellipse(s*6, -s*12, s*8.5, s*3.2, .12, 0, Math.PI*2); ctx.fill();

  // Eye inside the mask
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*7, -s*12, s*2.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*7.6, -s*11.8, s*1.6, 0, Math.PI*2); ctx.fill();

  // Prominent pink-mauve hooked beak, open
  ctx.fillStyle = '#C88AA0';
  ctx.beginPath(); ctx.moveTo(s*12,-s*10); ctx.quadraticCurveTo(s*22,-s*9,s*22.5,-s*6.5);
  ctx.quadraticCurveTo(s*22,-s*4.5,s*19,-s*4.5); ctx.lineTo(s*13,-s*5.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#A86A80';
  ctx.beginPath(); ctx.moveTo(s*13,-s*4.5); ctx.lineTo(s*20,-s*3.5); ctx.quadraticCurveTo(s*18,-s*1,s*14,-s*2); ctx.closePath(); ctx.fill();
  // Dark hooked tip
  ctx.fillStyle = '#503040';
  ctx.beginPath(); ctx.moveTo(s*20.5,-s*8.5); ctx.quadraticCurveTo(s*23.5,-s*7,s*22,-s*4.5); ctx.quadraticCurveTo(s*21,-s*5.5,s*20,-s*6.5); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawMagikarp(ctx, cx, cy, sz, angle) {
  const s = sz / 40;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * .4);

  // White fan tail trailing behind, red rim
  ctx.fillStyle = '#F5EFE2';
  ctx.beginPath();
  ctx.moveTo(-s*10,s*1);
  ctx.lineTo(-s*21,-s*9); ctx.lineTo(-s*17,-s*1);
  ctx.lineTo(-s*24,s*1);  ctx.lineTo(-s*17,s*4);
  ctx.lineTo(-s*21,s*12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#D84830'; ctx.lineWidth = s*1.4; ctx.stroke();

  // Big round orange-red body
  ctx.fillStyle = '#EE5A30';
  ctx.beginPath(); ctx.ellipse(s*1, s*2, s*15, s*13.5, 0, 0, Math.PI*2); ctx.fill();
  // Scale arcs
  ctx.strokeStyle = 'rgba(180,40,16,.45)'; ctx.lineWidth = s*1.1;
  for (let row = 0; row < 3; row++) for (let col = 0; col < 4; col++) {
    ctx.beginPath();
    ctx.arc(-s*8 + col*s*6.5 + (row%2)*s*3, -s*5 + row*s*6.5, s*3.4, .25, Math.PI - .25);
    ctx.stroke();
  }
  // Cream underside
  ctx.fillStyle = '#F8DFC8';
  ctx.beginPath(); ctx.ellipse(s*3, s*9, s*11, s*6, .05, 0, Math.PI*2); ctx.fill();

  // Yellow crown fin on top + matching fin below
  ctx.fillStyle = '#F8C830';
  ctx.beginPath();
  ctx.moveTo(-s*7,-s*9);
  ctx.lineTo(-s*7,-s*20); ctx.lineTo(-s*3,-s*12.5);
  ctx.lineTo(s*1,-s*21);  ctx.lineTo(s*4,-s*13);
  ctx.lineTo(s*8,-s*19);  ctx.lineTo(s*8,-s*10);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-s*4,s*13); ctx.lineTo(-s*3,s*21); ctx.lineTo(s*1,s*14.5); ctx.lineTo(s*5,s*20); ctx.lineTo(s*6,s*12);
  ctx.closePath(); ctx.fill();

  // White pectoral fin on the side
  ctx.fillStyle = '#F5EFE2';
  ctx.beginPath(); ctx.moveTo(s*2,s*4); ctx.quadraticCurveTo(-s*4,s*14,-s*12,s*15); ctx.quadraticCurveTo(-s*6,s*6,-s*2,s*2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#D84830'; ctx.lineWidth = s*1.1; ctx.stroke();

  // Huge gaping mouth with thick pink lips
  ctx.fillStyle = '#8A1A10';
  ctx.beginPath(); ctx.ellipse(s*12, -s*2, s*5.5, s*6.5, .1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#F0A0A8'; ctx.lineWidth = s*3;
  ctx.beginPath(); ctx.ellipse(s*12, -s*2, s*5.5, s*6.5, .1, 0, Math.PI*2); ctx.stroke();

  // Single long whisker drooping from the upper lip, curling forward
  ctx.strokeStyle = '#F8E8B0'; ctx.lineWidth = s*1.7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(s*16,-s*7.5); ctx.bezierCurveTo(s*23,-s*6, s*25,s*4, s*20,s*12); ctx.stroke();
  ctx.lineCap = 'butt';

  // One big round white eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*5, -s*8.5, s*4.6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,40,16,.5)'; ctx.lineWidth = s*1;
  ctx.beginPath(); ctx.arc(s*5, -s*8.5, s*4.6, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*6, -s*8.3, s*1.8, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

const CHARS = [
  { id:'charizard',  name:'Charizard',  col:'#FF6B35', draw:drawCharizard  },
  { id:'bulbasaur',  name:'Bulbasaur',  col:'#78C850', draw:drawBulbasaur  },
  { id:'charmander', name:'Charmander', col:'#F08030', draw:drawCharmander },

  { id:'pikachu',    name:'Pikachu',    col:'#F8D030', draw:drawPikachu    },
  { id:'dragonite',  name:'Dragonite',  col:'#E88030', draw:drawDragonite  },
  { id:'pidgey',     name:'Pidgey',     col:'#A8A878', draw:drawPidgey     },
  { id:'magikarp',   name:'Magikarp',   col:'#F03030', draw:drawMagikarp   },
];

// ─── CANVAS & STATE ───────────────────────────────────────────────────────────

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const CW = 400;

// Dynamic height: on portrait phones the screen is taller than 2:3, so we
// compute CH from the real viewport so the game fills it completely.
const CH = (() => {
  const vp = window.visualViewport;
  const vw = window.innerWidth  || 400;
  const vh = (vp ? vp.height : window.innerHeight) || 600;
  if (vw < 540 && vh > vw * 1.2) {
    return Math.min(900, Math.round(vh * CW / Math.min(vw, CW)));
  }
  return 600;
})();

// Size the wrapper element to fill the viewport — no black bars on any device.
// Cap at 1:1 CSS px so the game never balloons on large monitors.
(function sizeWrap() {
  const vp  = window.visualViewport;
  const vw  = window.innerWidth  || 400;
  const vh  = (vp ? vp.height : window.innerHeight) || 600;
  const s   = Math.min(vw / CW, vh / CH, 1);
  const el  = document.getElementById('wrap');
  if (el) { el.style.width = Math.round(CW * s) + 'px'; el.style.height = Math.round(CH * s) + 'px'; }
})();

// HiDPI: render at device resolution so the art is crisp on retina/mobile
const DPR = Math.min(window.devicePixelRatio || 1, 2);
canvas.width = CW * DPR; canvas.height = CH * DPR;
ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

let selectedChar = CHARS[0];
let score = 0;
let bestScore = (() => { try { return Math.max(0, parseInt(localStorage.getItem('pkflap_best'), 10) || 0); } catch(e) { return 0; } })();
let gamePhase = 'idle'; // 'idle' | 'playing' | 'dead'
let curScreen = 'start'; // 'start' | 'select' | 'gameover' | 'game'
let paused = false;
let runStartBest = bestScore, newBest = false;

// ─── SOUND (synthesised — no audio assets) ────────────────────────────────────

const SFX = (() => {
  let ac = null, muted = (() => { try { return localStorage.getItem('pkflap_mute') === '1'; } catch(e) { return false; } })();
  function ensureAC() {
    if (!ac) {
      try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (ac && ac.state === 'suspended') ac.resume();
    return ac;
  }
  function tone(freq, dur, type, vol, slide, delay) {
    if (muted) return;
    try {
      const a = ensureAC();
      if (!a) return;
      const t = a.currentTime + (delay || 0);
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(.001, t + dur);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t + dur + .02);
    } catch (e) { /* no audio available — play silently */ }
  }
  return {
    flap()   { tone(440, .09, 'triangle', .15, 240); },
    score()  { tone(660, .08, 'square', .08); tone(880, .1, 'square', .08, 0, .07); },
    ball()   { tone(523, .07, 'sine', .15); tone(784, .08, 'sine', .15, 0, .06); tone(1047, .12, 'sine', .15, 0, .12); },
    hit()    { tone(160, .22, 'sawtooth', .2, -100); tone(500, .35, 'square', .07, -420, .08); },
    unlock() { ensureAC(); },
    isMuted()  { return muted; },
    toggle()   { muted = !muted; try { localStorage.setItem('pkflap_mute', muted ? '1' : '0'); } catch(e) {} return muted; },
  };
})();

// Unlock AudioContext on first user gesture — critical for iOS Safari
document.addEventListener('touchstart', () => SFX.unlock(), { once: true, passive: true });
document.addEventListener('click',      () => SFX.unlock(), { once: true, passive: true });

function buzz(ms) { if (navigator.vibrate) try { navigator.vibrate(ms); } catch (e) {} }

// ─── PARTICLES & SCREEN JUICE ─────────────────────────────────────────────────

let parts = [];
let shake = 0, flash = 0, scorePop = 0;

function burst(x, y, n, col, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = Math.random() * (spd || 2.5) + .8;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 1, life: 1, col, r: Math.random() * 2.5 + 1.5 });
  }
}

// Bird
const BIRD_X = 85;
const BIRD_R = 22;
const GRAVITY = 0.35;   // gentle — floaty fall without being sluggish
const FLAP_V  = -6.8;   // moderate — less height than original, still responsive

let bird = { y:CH/2, vy:0, angle:0 };

// Pipes
const PIPE_W = 58;
let pipes = [];
let pipeTimer = 0;

// Ground
const GH = 58;
let groundX = 0;  // wrapped offset for ground tufts, derived from scrollX
let scrollX = 0;  // continuous distance travelled — keeps grass layers seam-free

// Clouds
let clouds = [
  {x:80, y:75, w:90, spd:.4},
  {x:265,y:130,w:70, spd:.35},
  {x:165,y:48, w:110,spd:.5},
];

// Butterfree flying the opposite direction to the game scroll
let bgFlyer = { x: 200, baseY: 152 };

// Poké Ball pickups — drift between pipes, +1 bonus point when collected
let balls = [];

// Day → sunset → night cycle, advancing one phase every 10 points (loops)
let skyCur = 0;

// Fixed starfield for the night sky
const STARS = Array.from({ length: 34 }, () => ({
  x: Math.random() * CW, y: Math.random() * 300,
  r: Math.random() * 1.3 + .5, tw: Math.random() * Math.PI * 2,
}));

// ─── DIFFICULTY ───────────────────────────────────────────────────────────────

function diff() {
  const t = Math.min(score, 50);
  return {
    speed:  2.0 + t * 0.055,
    gap:    Math.max(105, 170 - t * 1.3),
    spawn:  Math.max(58, 95 - t * 0.75),
  };
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────

function resetGame() {
  bird = { y:CH/2, vy:0, angle:0 };
  pipes = [];
  balls = [];
  parts = [];
  pipeTimer = 0;
  groundX = scrollX = 0;
  score = 0;
  shake = flash = scorePop = 0;
  skyCur = 0;
  runStartBest = bestScore;
  newBest = false;
  paused = false;
  gamePhase = 'idle';
}

function flap() {
  if (curScreen !== 'game') return;
  if (paused) { paused = false; return; }
  if (gamePhase === 'dead') return;
  if (gamePhase === 'idle') gamePhase = 'playing';
  bird.vy = FLAP_V;
  SFX.flap();
  // little air puff under the tail
  for (let i = 0; i < 4; i++) parts.push({
    x: BIRD_X - 14 + Math.random() * 8, y: bird.y + 16,
    vx: -1 - Math.random(), vy: .5 + Math.random(), life: .7,
    col: 'rgba(255,255,255,.9)', r: Math.random() * 2 + 1.5,
  });
}

function addPoint(quiet) {
  score++; scorePop = 1;
  if (!quiet) { SFX.score(); buzz(10); }
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('pkflap_best', bestScore); } catch(e) {}
  }
  if (score > runStartBest) newBest = true;
}

function update(dt) {
  const d = diff();
  clouds.forEach(c => { c.x -= c.spd * dt; if (c.x + c.w < 0) c.x = CW + c.w; });
  bgFlyer.x += 0.55 * dt; if (bgFlyer.x > CW + 60) bgFlyer.x = -60;

  // Juice decay + particle physics run in every phase
  shake    = Math.max(0, shake - .6 * dt);
  flash    = Math.max(0, flash - .05 * dt);
  scorePop = Math.max(0, scorePop - .06 * dt);
  for (const p of parts) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += .1 * dt; p.life -= .035 * dt; }
  parts = parts.filter(p => p.life > 0);

  // Sky eases toward the phase set by score
  skyCur += (score / 10 - skyCur) * Math.min(.02 * dt, 1);

  if (gamePhase !== 'playing') {
    if (gamePhase === 'idle') { bird.y = CH/2 + Math.sin(Date.now()*.002)*12; bird.angle = 0; }
    if (gamePhase === 'dead' && bird.y + BIRD_R < CH - GH + 14) {
      // tumble to the ground
      bird.vy += GRAVITY * dt;
      bird.y += bird.vy * dt;
      bird.angle = Math.min(bird.angle + .06 * dt, 1.35);
    }
    return;
  }

  bird.vy   += GRAVITY * dt;
  bird.vy    = Math.min(bird.vy, 9);   // terminal velocity — stops runaway drops
  bird.y    += bird.vy * dt;
  bird.angle = Math.atan2(bird.vy, 9) * .65;
  scrollX   += d.speed * dt;
  groundX    = -(scrollX % 40);

  pipeTimer += dt;
  if (pipeTimer >= d.spawn) {
    pipeTimer = 0;
    const minGap = 70, maxGap = CH - GH - d.gap - 70;
    pipes.push({ x: CW + 20, gy: minGap + Math.random() * (maxGap - minGap), gap: d.gap, scored: false });
    // Sometimes drop a Poké Ball halfway to the next pipe
    if (Math.random() < .35) balls.push({
      x: CW + 20 + d.spawn * d.speed * .5,
      y: 90 + Math.random() * (CH - GH - 180),
      rot: Math.random() * Math.PI * 2, got: false,
    });
  }

  for (const p of pipes) {
    p.x -= d.speed * dt;
    if (!p.scored && p.x + PIPE_W < BIRD_X) {
      p.scored = true; addPoint();
      burst(BIRD_X + 18, bird.y, 6, '#FFE060', 2);
    }
  }
  pipes = pipes.filter(p => p.x > -PIPE_W - 20);

  for (const b of balls) {
    b.x -= d.speed * dt; b.rot += .04 * dt;
    if (!b.got && Math.hypot(b.x - BIRD_X, b.y - bird.y) < BIRD_R + 12) {
      b.got = true; addPoint(true); SFX.ball(); buzz(12);
      burst(b.x, b.y, 12, '#FF4444', 3);
      burst(b.x, b.y, 8, '#FFFFFF', 2.2);
    }
  }
  balls = balls.filter(b => !b.got && b.x > -30);

  if (bird.y - BIRD_R < 0) { bird.y = BIRD_R; bird.vy = Math.max(0, bird.vy); }
  if (bird.y + BIRD_R > CH - GH) { die(); return; }

  const FG = 5;
  for (const p of pipes) {
    if (BIRD_X + BIRD_R - FG > p.x && BIRD_X - BIRD_R + FG < p.x + PIPE_W) {
      if (bird.y - BIRD_R + FG < p.gy || bird.y + BIRD_R - FG > p.gy + p.gap) { die(); return; }
    }
  }
}

function die() {
  gamePhase = 'dead'; bird.vy = -5;
  SFX.hit(); buzz(60);
  shake = 11; flash = .55;
  burst(BIRD_X, bird.y, 14, '#FFFFFF', 3.5);
  burst(BIRD_X, bird.y, 10, selectedChar.col, 3);
  setTimeout(() => {
    document.getElementById('go-score').textContent = score;
    document.getElementById('go-best').textContent = bestScore;
    const medal = score >= 40 ? '🏆' : score >= 25 ? '🥇' : score >= 15 ? '🥈' : score >= 8 ? '🥉' : '';
    const mEl = document.getElementById('go-medal');
    mEl.textContent = medal;
    mEl.classList.toggle('hide', !medal);
    document.getElementById('go-newbest').classList.toggle('hide', !(newBest && score > 0));
    showScreen('gameover');
  }, 700);
}

// ─── RENDERING ────────────────────────────────────────────────────────────────

// Sky gradients are built once, not per frame
const SKIES = [
  ['#4899D8', '#98D4F8', '#C8EEBB'],   // day
  ['#5858A8', '#F88860', '#FFD8A0'],   // sunset
  ['#0A1038', '#283068', '#3A4880'],   // night
].map(stops => {
  const g = ctx.createLinearGradient(0, 0, 0, CH);
  g.addColorStop(0, stops[0]); g.addColorStop(.5, stops[1]); g.addColorStop(1, stops[2]);
  return g;
});

function nightAmount() {
  const p = ((skyCur % 3) + 3) % 3;
  const d = Math.min(Math.abs(p - 2), 3 - Math.abs(p - 2));
  return Math.max(0, 1 - d);
}

function render() {
  // Sky: crossfade between the current phase and the next
  const p = ((skyCur % 3) + 3) % 3, pi = Math.floor(p) % 3, pf = p - Math.floor(p);
  ctx.fillStyle = SKIES[pi]; ctx.fillRect(0, 0, CW, CH);
  if (pf > .001) {
    ctx.globalAlpha = pf;
    ctx.fillStyle = SKIES[(pi + 1) % 3]; ctx.fillRect(0, 0, CW, CH);
    ctx.globalAlpha = 1;
  }

  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);

  const night = nightAmount();
  if (night > .05) drawStars(night);
  drawSun(night);
  drawScenery();
  clouds.forEach(c => drawCloud(c.x, c.y, c.w));
  drawBgButterfree(bgFlyer.x, bgFlyer.baseY + Math.sin(Date.now() * .0009) * 14);
  pipes.forEach(pp => drawPipe(pp));
  balls.forEach(b => drawPokeball(b));
  drawGround();
  // Wild Pokémon drawn after grass so they appear in front of it
  drawOddish(ctx, 92, CH - GH);
  drawOddish(ctx, 305, CH - GH);
  drawDiglett(ctx, 345, CH - GH);

  selectedChar.draw(ctx, BIRD_X, bird.y, BIRD_R * 2, bird.angle);

  for (const pt of parts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, pt.life));
    ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Atmosphere + impact overlays
  if (night > .05) { ctx.fillStyle = 'rgba(10,15,50,' + (night * .38).toFixed(3) + ')'; ctx.fillRect(0, 0, CW, CH); }
  if (flash > 0)   { ctx.fillStyle = 'rgba(255,255,255,' + flash.toFixed(3) + ')'; ctx.fillRect(0, 0, CW, CH); }

  if (gamePhase === 'playing' || gamePhase === 'dead') drawScoreHUD();
  if (gamePhase === 'idle' && curScreen === 'game') drawTapHint();
  if (paused) drawPaused();
}

function drawStars(a) {
  const t = Date.now() * .002;
  ctx.fillStyle = '#FFF8D8';
  for (const st of STARS) {
    ctx.globalAlpha = a * (.4 + .6 * Math.abs(Math.sin(t + st.tw)));
    ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Static scenery (mountains, Pokémon Center, trees, Oddish) is pre-rendered
// once to an offscreen canvas — a single drawImage per frame after that
let sceneryCache = null;
function drawScenery() {
  if (!sceneryCache) {
    sceneryCache = document.createElement('canvas');
    sceneryCache.width = CW * DPR; sceneryCache.height = CH * DPR;
    const g = sceneryCache.getContext('2d');
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    drawMountains(g);
  }
  ctx.drawImage(sceneryCache, 0, 0, CW, CH);
}

function drawPokeball(b) {
  const r = 12;
  ctx.save();
  ctx.translate(b.x, b.y + Math.sin(Date.now() * .004 + b.rot) * 3);
  ctx.rotate(Math.sin(b.rot) * .25);
  ctx.fillStyle = '#F8F8F8';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#E83030';
  ctx.beginPath(); ctx.arc(0, 0, r, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.fillRect(-r, -1.6, r * 2, 3.2);
  ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.55)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(-4, -6, 3, 2, -.6, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Paused', CW / 2, CH / 2 - 16);
  ctx.font = 'bold 15px Arial';
  ctx.fillText('Tap / Space to resume', CW / 2, CH / 2 + 16);
}

// ─── SUN ─────────────────────────────────────────────────────────────────────

const SUN_GLOW = (() => {
  const g = ctx.createRadialGradient(CW-60,58,10, CW-60,58,32);
  g.addColorStop(0,'rgba(255,240,80,.55)'); g.addColorStop(1,'rgba(255,220,0,0)');
  return g;
})();

function drawSun(night) {
  const sx = CW - 60, sy = 58;
  const day = 1 - (night || 0);
  if (day > .03) {
    ctx.globalAlpha = day;
    // Rotating rays
    ctx.strokeStyle = 'rgba(255,230,60,.65)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    const rot = Date.now() * .0003;
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4 + rot;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a)*25, sy + Math.sin(a)*25);
      ctx.lineTo(sx + Math.cos(a)*38, sy + Math.sin(a)*38);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
    // Glow halo
    ctx.fillStyle = SUN_GLOW; ctx.beginPath(); ctx.arc(sx,sy,32,0,Math.PI*2); ctx.fill();
    // Sun disc
    ctx.fillStyle = '#FFE830'; ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF260'; ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (night > .03) {
    // Moon with craters
    ctx.globalAlpha = night;
    ctx.fillStyle = '#E8E8D8'; ctx.beginPath(); ctx.arc(sx, sy, 17, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(180,180,160,.55)';
    ctx.beginPath(); ctx.arc(sx-5, sy-3, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+6, sy+5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+2, sy-8, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── MOUNTAINS ───────────────────────────────────────────────────────────────

function drawMountains(ctx) {
  // Far layer — pale blue-violet peaks
  ctx.fillStyle = 'rgba(160,168,210,.65)';
  ctx.beginPath(); ctx.moveTo(0,CH-GH);
  ctx.lineTo(0,275); ctx.lineTo(35,225); ctx.lineTo(65,255); ctx.lineTo(100,200);
  ctx.lineTo(130,240); ctx.lineTo(160,190); ctx.lineTo(195,230); ctx.lineTo(225,185);
  ctx.lineTo(255,220); ctx.lineTo(285,195); ctx.lineTo(315,235); ctx.lineTo(348,185);
  ctx.lineTo(375,215); ctx.lineTo(400,200); ctx.lineTo(400,CH-GH);
  ctx.closePath(); ctx.fill();
  // Snow caps
  ctx.fillStyle = 'rgba(240,245,255,.7)';
  const peaks = [[35,225],[100,200],[160,190],[225,185],[285,195],[348,185]];
  peaks.forEach(([px,py]) => {
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-14,py+22); ctx.lineTo(px+14,py+22); ctx.closePath(); ctx.fill();
  });

  // Near layer — rounded green hills
  ctx.fillStyle = 'rgba(100,170,100,.6)';
  ctx.beginPath(); ctx.moveTo(0,CH-GH);
  ctx.quadraticCurveTo(40,310, 80,330);
  ctx.quadraticCurveTo(130,285, 180,315);
  ctx.quadraticCurveTo(230,275, 280,308);
  ctx.quadraticCurveTo(330,280, 380,305);
  ctx.lineTo(400,320); ctx.lineTo(400,CH-GH); ctx.lineTo(0,CH-GH);
  ctx.closePath(); ctx.fill();

  // Trees on hills — small stylised firs
  const trees = [[55,328],[120,308],[210,310],[300,300],[365,315]];
  trees.forEach(([tx,ty]) => drawTree(ctx, tx, ty));

  // Pokémon Center on the hill
  drawPokeCenter(ctx);
  // (Oddish and Diglett are drawn live after the grass strip, not cached here)
}

function drawTree(ctx, tx, ty) {
  ctx.fillStyle = 'rgba(50,120,50,.7)';
  // Three layered triangles (fir tree silhouette)
  ctx.beginPath(); ctx.moveTo(tx,ty-28); ctx.lineTo(tx-12,ty-8); ctx.lineTo(tx+12,ty-8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(tx,ty-18); ctx.lineTo(tx-14,ty-2); ctx.lineTo(tx+14,ty-2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(tx,ty-8); ctx.lineTo(tx-10,ty+6); ctx.lineTo(tx+10,ty+6); ctx.closePath(); ctx.fill();
  // Trunk
  ctx.fillStyle = 'rgba(100,60,20,.6)';
  ctx.fillRect(tx-3, ty+5, 6, 8);
}

// ─── CLOUD ────────────────────────────────────────────────────────────────────

function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,.84)';
  ctx.beginPath(); ctx.arc(x,        y,    w*.28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.28,  y-w*.12,w*.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.52,  y,    w*.23, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*.18,  y+w*.06,w*.18,0, Math.PI*2); ctx.fill();
}

// ─── PIPES ───────────────────────────────────────────────────────────────────

function drawPipe(p) {
  const capH = 18, capX = p.x - 5, capW = PIPE_W + 10;

  // Top pipe body
  ctx.fillStyle = '#2A8A45';
  ctx.fillRect(p.x, 0, PIPE_W, p.gy - capH);
  ctx.fillStyle = '#38A858';
  ctx.fillRect(capX, p.gy - capH, capW, capH);
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.fillRect(p.x+5, 0, 8, p.gy - capH);
  ctx.fillStyle = '#1A6030';
  ctx.fillRect(p.x, 0, 4, p.gy - capH);
  ctx.fillRect(capX, p.gy-capH, 4, capH);
  // Leaf tufts on top pipe cap
  drawPipeLeaves(p.x + PIPE_W/2, p.gy - capH, false);

  // Bottom pipe body
  const by = p.gy + p.gap, bh = CH - GH - by;
  ctx.fillStyle = '#2A8A45';
  ctx.fillRect(p.x, by + capH, PIPE_W, bh - capH);
  ctx.fillStyle = '#38A858';
  ctx.fillRect(capX, by, capW, capH);
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.fillRect(p.x+5, by+capH, 8, bh-capH);
  ctx.fillStyle = '#1A6030';
  ctx.fillRect(p.x, by+capH, 4, bh-capH);
  ctx.fillRect(capX, by, 4, capH);
  // Leaf tufts on bottom pipe cap
  drawPipeLeaves(p.x + PIPE_W/2, by, true);
}

function drawPipeLeaves(cx, cy, flipped) {
  const dir = flipped ? 1 : -1;
  ctx.fillStyle = '#228838';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(cx + i * 14, cy + dir * 10, 7, 12, i * .4, 0, Math.PI*2);
    ctx.fill();
  }
  // Lighter vein on each leaf
  ctx.fillStyle = '#44AA55';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(cx + i * 14, cy + dir * 10, 3, 7, i * .4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── GROUND ───────────────────────────────────────────────────────────────────

// Tall-grass layers are pre-rendered to strips once and scrolled with two
// drawImage calls per frame instead of ~60 bézier path fills
const GRASS_H = 34;
function makeGrassStrip(period, col, blades) {
  const c = document.createElement('canvas');
  c.width = (CW + period) * DPR; c.height = GRASS_H * DPR;
  const g = c.getContext('2d');
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.fillStyle = col;
  // overdraw one period either side so the sampling window never shows a seam
  for (let x = -period; x < CW + period * 2; x += period) blades(g, x, GRASS_H);
  return c;
}
const grassDark = makeGrassStrip(14, '#3A9818', (g, x, h) => {
  g.beginPath();
  g.moveTo(x, h);
  g.quadraticCurveTo(x - 7, h - 18, x - 4, h - 30);
  g.quadraticCurveTo(x + 2, h - 18, x + 5, h);
  g.fill();
  g.beginPath();
  g.moveTo(x + 7, h);
  g.quadraticCurveTo(x + 14, h - 15, x + 10, h - 26);
  g.quadraticCurveTo(x + 5, h - 15, x + 3, h);
  g.fill();
});
const grassLight = makeGrassStrip(18, '#58BC28', (g, x, h) => {
  g.beginPath();
  g.moveTo(x + 4, h);
  g.quadraticCurveTo(x - 3, h - 20, x, h - 32);
  g.quadraticCurveTo(x + 6, h - 20, x + 8, h);
  g.fill();
});

function drawGround() {
  const grassY = CH - GH;
  const dOff = (scrollX * 1.2) % 14;
  const lOff = (scrollX * .9) % 18;
  ctx.drawImage(grassDark,  dOff * DPR, 0, CW * DPR, GRASS_H * DPR, 0, grassY - GRASS_H, CW, GRASS_H);
  ctx.drawImage(grassLight, lOff * DPR, 0, CW * DPR, GRASS_H * DPR, 0, grassY - GRASS_H, CW, GRASS_H);

  // Dirt
  ctx.fillStyle = '#8B6914'; ctx.fillRect(0, grassY, CW, GH);
  // Grass strip
  ctx.fillStyle = '#4A8A20'; ctx.fillRect(0, grassY, CW, 14);
  // Ground tufts
  ctx.fillStyle = '#3A7A10';
  for (let x = groundX; x < CW + 40; x += 40) {
    ctx.beginPath(); ctx.arc(x, grassY+7, 11, Math.PI, 0); ctx.fill();
  }
  // Dirt texture
  ctx.fillStyle = '#7A5A0A';
  for (let x = groundX+2; x < CW + 40; x += 40) {
    ctx.fillRect(x, grassY+16, 20, 5);
    ctx.fillRect(x+22, grassY+26, 14, 4);
  }
}

// ─── POKÉMON CENTER ──────────────────────────────────────────────────────────

function drawPokeCenter(ctx) {
  // Sits on the nearest green hill, centred at cx=175.
  // baseY = hill surface at x≈175 (quadratic through (80,330)→cp(130,285)→(180,315) ≈ y 312)
  const cx = 175, baseY = 312;
  const bw = 100, bh = 62;
  const bx = cx - bw / 2;   // = 125

  ctx.save();
  ctx.globalAlpha = 0.88;

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,.13)';
  ctx.fillRect(bx + 4, baseY - 2, bw, 6);

  // Main walls — white/off-white
  ctx.fillStyle = '#F2F2FA';
  ctx.fillRect(bx, baseY - bh, bw, bh);

  // ── Dome arch roof ──────────────────────────────────────────
  const roofBot = baseY - bh;      // top of walls = bottom of roof
  const domeH   = 38;
  ctx.fillStyle = '#CC2222';
  ctx.beginPath();
  ctx.moveTo(bx - 5, roofBot + 3);
  ctx.bezierCurveTo(bx - 5, roofBot - domeH + 8, cx - 22, roofBot - domeH - 4, cx, roofBot - domeH);
  ctx.bezierCurveTo(cx + 22, roofBot - domeH - 4, bx + bw + 5, roofBot - domeH + 8, bx + bw + 5, roofBot + 3);
  ctx.closePath(); ctx.fill();

  // Roof eave (darker trim at the bottom edge of the dome)
  ctx.fillStyle = '#AA1818';
  ctx.fillRect(bx - 6, roofBot - 2, bw + 12, 6);

  // ── Pink dome / finial at peak ────────────────────────────────
  const peakY = roofBot - domeH;
  ctx.fillStyle = '#FF9999';
  ctx.beginPath(); ctx.arc(cx, peakY, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFBBBB';
  ctx.beginPath(); ctx.arc(cx - 2.5, peakY - 2.5, 4.5, 0, Math.PI * 2); ctx.fill();

  // ── Poké Ball on the front dome face ─────────────────────────
  const pbX = cx, pbY = roofBot - domeH / 2 - 2;
  const pbR = 12;
  // Red half
  ctx.fillStyle = '#CC2222';
  ctx.beginPath(); ctx.arc(pbX, pbY, pbR, Math.PI, 0); ctx.fill();
  // White half
  ctx.fillStyle = '#F8F8F8';
  ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI); ctx.fill();
  // Black outline + midline
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pbX - pbR, pbY); ctx.lineTo(pbX + pbR, pbY); ctx.stroke();
  // Centre button
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(pbX, pbY, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(pbX, pbY, 4.5, 0, Math.PI * 2); ctx.stroke();

  // ── Windows ──────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(160,215,245,.78)';
  ctx.fillRect(bx + 7, baseY - bh + 9, 18, 14);
  ctx.fillRect(bx + bw - 25, baseY - bh + 9, 18, 14);
  ctx.strokeStyle = 'rgba(100,160,210,.88)'; ctx.lineWidth = 1;
  ctx.strokeRect(bx + 7, baseY - bh + 9, 18, 14);
  ctx.strokeRect(bx + bw - 25, baseY - bh + 9, 18, 14);
  // Window sash lines
  ctx.beginPath();
  ctx.moveTo(bx + 16, baseY - bh + 9); ctx.lineTo(bx + 16, baseY - bh + 23);
  ctx.moveTo(bx + bw - 16, baseY - bh + 9); ctx.lineTo(bx + bw - 16, baseY - bh + 23);
  ctx.stroke();

  // ── Double door ───────────────────────────────────────────────
  ctx.fillStyle = 'rgba(130,198,242,.85)';
  ctx.fillRect(cx - 10, baseY - 22, 20, 22);
  ctx.strokeStyle = 'rgba(80,145,198,.9)'; ctx.lineWidth = 1;
  ctx.strokeRect(cx - 10, baseY - 22, 20, 22);
  ctx.beginPath(); ctx.moveTo(cx, baseY - 22); ctx.lineTo(cx, baseY); ctx.stroke();

  // ── Red cross above door (classic Pokémon Center symbol) ────────
  const crossX = cx, crossY = baseY - bh + 42;
  ctx.fillStyle = '#CC2222';
  ctx.fillRect(crossX - 3, crossY - 9, 6, 18);   // vertical bar
  ctx.fillRect(crossX - 9, crossY - 3, 18, 6);   // horizontal bar

  // Wall outline
  ctx.strokeStyle = 'rgba(170,165,195,.35)'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, baseY - bh, bw, bh);

  ctx.restore();
}

// ─── WILD ODDISH ─────────────────────────────────────────────────────────────

function drawOddish(ctx, ox, oy) {
  // oy = ground line; body and leaves peek above it
  ctx.save();
  ctx.globalAlpha = 0.76;
  const r = 10;

  // Leaves behind body
  ctx.fillStyle = '#3A9030';
  ctx.beginPath(); ctx.ellipse(ox,     oy - r * 2.5, 3.5, 9,    0,    0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ox - 7, oy - r * 2.0, 3,   8, -0.5,   0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ox + 7, oy - r * 2.0, 3,   8,  0.5,   0, Math.PI * 2); ctx.fill();

  // Round body
  ctx.fillStyle = '#4858A8';
  ctx.beginPath(); ctx.arc(ox, oy - r, r, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(ox - 3.5, oy - r - 1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + 3.5, oy - r - 1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#202038';
  ctx.beginPath(); ctx.arc(ox - 3.5, oy - r - 1, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + 3.5, oy - r - 1, 1.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── DIGLETT ─────────────────────────────────────────────────────────────────

function drawDiglett(ctx, x, groundY) {
  // groundY = ground line; Diglett pokes head out of a rocky dirt mound
  ctx.save();
  ctx.globalAlpha = 0.80;

  // Soil mound (rocky dirt pile around the hole)
  ctx.fillStyle = '#9A7040';
  ctx.beginPath(); ctx.ellipse(x, groundY + 2, 20, 9, 0, Math.PI, 0); ctx.fill();
  // Stone highlights on the mound
  ctx.fillStyle = '#7A5830';
  ctx.beginPath(); ctx.ellipse(x - 10, groundY - 2, 6, 3.5, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 9, groundY - 1, 5, 3, 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#C49858';
  ctx.beginPath(); ctx.ellipse(x + 1, groundY - 4, 4, 2.5, -0.1, 0, Math.PI * 2); ctx.fill();

  // Head — warm brown rounded dome
  ctx.fillStyle = '#C07858';
  ctx.beginPath(); ctx.arc(x, groundY - 12, 11, 0, Math.PI * 2); ctx.fill();
  // Shading on head
  ctx.fillStyle = '#A86040';
  ctx.beginPath(); ctx.arc(x + 3, groundY - 10, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#C07858';
  ctx.beginPath(); ctx.arc(x, groundY - 13, 8, 0, Math.PI * 2); ctx.fill();

  // Big oval pink nose (most distinctive Diglett feature)
  ctx.fillStyle = '#F07870';
  ctx.beginPath(); ctx.ellipse(x, groundY - 11, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFAAAA';
  ctx.beginPath(); ctx.ellipse(x - 1.5, groundY - 12.5, 2.5, 1.8, -0.3, 0, Math.PI * 2); ctx.fill();

  // Beady dot eyes
  ctx.fillStyle = '#111111';
  ctx.beginPath(); ctx.arc(x - 4, groundY - 16, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, groundY - 16, 2, 0, Math.PI * 2); ctx.fill();
  // White glint
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(x - 3.2, groundY - 16.8, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4.8, groundY - 16.8, 0.8, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── BACKGROUND BUTTERFREE ───────────────────────────────────────────────────

function drawBgButterfree(x, y) {
  ctx.save();
  ctx.globalAlpha = 0.58;
  const t = Date.now() * 0.009;
  // Wings beat: upper rise, lower drop on opposite phase
  const liftU = Math.sin(t) * 11;
  const liftD = Math.cos(t) * 5;

  // ── Upper wings (white + black border + black spot) ────────────
  function upperWing(side) {
    const s = side; // +1 right, -1 left
    ctx.fillStyle = '#F4F4F0';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x + s * 7, y - 6 - liftU, x + s * 24, y - 16 - liftU, x + s * 27, y - 4);
    ctx.bezierCurveTo(x + s * 22, y + 5, x + s * 10, y + 7, x, y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a1818'; ctx.lineWidth = 1.4;
    ctx.stroke();
    // Black oval spot on upper wing
    ctx.fillStyle = '#1a1818';
    ctx.beginPath(); ctx.ellipse(x + s * 16, y - 10 - liftU * 0.5, 3.5, 2.5, s * 0.4, 0, Math.PI * 2); ctx.fill();
  }
  upperWing(1); upperWing(-1);

  // ── Lower wings (white + black border, wider/rounder) ──────────
  function lowerWing(side) {
    const s = side;
    ctx.fillStyle = '#F4F4F0';
    ctx.beginPath();
    ctx.moveTo(x + s * 2, y + 4);
    ctx.bezierCurveTo(x + s * 10, y + 3 + liftD, x + s * 21, y + 7 + liftD, x + s * 21, y + 18);
    ctx.bezierCurveTo(x + s * 14, y + 22, x + s * 5, y + 16, x + s * 2, y + 8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a1818'; ctx.lineWidth = 1.4;
    ctx.stroke();
    // Small oval spot on lower wing
    ctx.fillStyle = '#1a1818';
    ctx.beginPath(); ctx.ellipse(x + s * 14, y + 14 + liftD * 0.4, 2.8, 2, 0, 0, Math.PI * 2); ctx.fill();
  }
  lowerWing(1); lowerWing(-1);

  // ── Blue-teal body ────────────────────────────────────────────
  ctx.fillStyle = '#3A7A9A';
  ctx.beginPath(); ctx.ellipse(x, y + 6, 3.2, 9, 0, 0, Math.PI * 2); ctx.fill();

  // ── Head (darker teal) ────────────────────────────────────────
  ctx.fillStyle = '#2E6880';
  ctx.beginPath(); ctx.arc(x, y - 1, 4.5, 0, Math.PI * 2); ctx.fill();

  // ── Large compound eyes (prominent red) ───────────────────────
  ctx.fillStyle = '#CC1818';
  ctx.beginPath(); ctx.arc(x - 5, y - 2, 4.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5, y - 2, 4.2, 0, Math.PI * 2); ctx.fill();
  // Eye sheen
  ctx.fillStyle = '#FF4444';
  ctx.beginPath(); ctx.arc(x - 6, y - 3.5, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, y - 3.5, 1.8, 0, Math.PI * 2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#220000';
  ctx.beginPath(); ctx.arc(x - 4.5, y - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5.5, y - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();

  // ── Antennae (black, curving outward, ball tips) ───────────────
  ctx.strokeStyle = '#1a1818'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - 2, y - 4); ctx.quadraticCurveTo(x - 7, y - 11, x - 10, y - 15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 2, y - 4); ctx.quadraticCurveTo(x + 7, y - 11, x + 10, y - 15); ctx.stroke();
  ctx.fillStyle = '#1a1818';
  ctx.beginPath(); ctx.arc(x - 10, y - 15, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 10, y - 15, 2.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────

function drawScoreHUD() {
  const txt = String(score), bw = Math.max(70, txt.length * 18 + 30);
  const bx = CW/2 - bw/2, by = 14;
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  roundRect(ctx, bx+2, by+3, bw, 36, 10); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.92)';
  roundRect(ctx, bx, by, bw, 36, 10); ctx.fill();
  ctx.save();
  ctx.translate(CW/2, by+18);
  ctx.scale(1 + scorePop*.35, 1 + scorePop*.35);
  ctx.fillStyle = '#222'; ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, 0, 0);
  ctx.restore();
}

function drawTapHint() {
  const alpha = .5 + .5 * Math.sin(Date.now() * .004);
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
  ctx.fillText('Tap / Space to start!', CW/2, CH/2 + 70);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────

function showScreen(name) {
  curScreen = name;
  document.getElementById('s-start').classList.add('hide');
  document.getElementById('s-select').classList.add('hide');
  document.getElementById('s-gameover').classList.add('hide');
  if (name === 'start') {
    document.getElementById('start-best').textContent = 'Best: ' + bestScore;
    document.getElementById('s-start').classList.remove('hide');
  }
  if (name === 'select')   document.getElementById('s-select').classList.remove('hide');
  if (name === 'gameover') document.getElementById('s-gameover').classList.remove('hide');
}

function startGame() { resetGame(); showScreen('game'); }

// ─── CHARACTER SELECT UI ──────────────────────────────────────────────────────

function buildCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'cc' + (ch.id === selectedChar.id ? ' sel' : '');
    const mc = document.createElement('canvas');
    mc.width = 56 * DPR; mc.height = 56 * DPR;
    mc.style.width = '56px'; mc.style.height = '56px';
    const mctx = mc.getContext('2d');
    mctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    mctx.fillStyle = ch.col + '28';
    mctx.beginPath(); mctx.arc(28,28,25,0,Math.PI*2); mctx.fill();
    ch.draw(mctx, 28, 28, 46, 0);
    const lbl = document.createElement('span');
    lbl.textContent = ch.name;
    card.appendChild(mc); card.appendChild(lbl);
    card.addEventListener('click', () => {
      document.querySelectorAll('.cc').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      selectedChar = CHARS.find(c => c.id === ch.id);
    });
    grid.appendChild(card);
  });
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────

const pCanvas = document.getElementById('preview-canvas');
pCanvas.width = 80 * DPR; pCanvas.height = 80 * DPR;
pCanvas.style.width = '80px'; pCanvas.style.height = '80px';
const pCtx = pCanvas.getContext('2d');
pCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
const startScreenEl = document.getElementById('s-start');

function animPreview() {
  // only draw while the start screen is actually visible
  if (!startScreenEl.classList.contains('hide')) {
    pCtx.clearRect(0,0,80,80);
    pCtx.fillStyle = selectedChar.col + '28';
    pCtx.beginPath(); pCtx.arc(40,40,36,0,Math.PI*2); pCtx.fill();
    selectedChar.draw(pCtx, 40, 40, 64, Math.sin(Date.now()*.002)*.2);
  }
  requestAnimationFrame(animPreview);
}
animPreview();

// ─── EVENTS ──────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (curScreen === 'game') flap();
    else if (curScreen === 'start' || curScreen === 'gameover') startGame();
  }
  if (e.code === 'Enter') {
    e.preventDefault();
    if (curScreen !== 'game') startGame();
  }
  if (e.code === 'KeyR' && curScreen === 'gameover') startGame();
  if (e.code === 'KeyP' && curScreen === 'game' && gamePhase === 'playing') paused = !paused;
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive:false });

const muteBtn = document.getElementById('btn-mute');
muteBtn.textContent = SFX.isMuted() ? '🔇' : '🔊';
muteBtn.addEventListener('click', e => {
  e.stopPropagation();
  muteBtn.textContent = SFX.toggle() ? '🔇' : '🔊';
  muteBtn.blur();
});

// Auto-pause if the tab/app goes to the background mid-run
document.addEventListener('visibilitychange', () => {
  if (document.hidden && curScreen === 'game' && gamePhase === 'playing') paused = true;
});

document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-to-sel').addEventListener('click', () => { buildCharGrid(); showScreen('select'); });
document.getElementById('btn-confirm').addEventListener('click', startGame);
document.getElementById('btn-back').addEventListener('click', () => showScreen('start'));
document.getElementById('btn-again').addEventListener('click', startGame);
document.getElementById('btn-change').addEventListener('click', () => { buildCharGrid(); showScreen('select'); });

// ─── LOOP ────────────────────────────────────────────────────────────────────

let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 16.667, 3);
  lastTs = ts;
  if (!paused) update(dt);
  render();
  requestAnimationFrame(loop);
}
showScreen('start');
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
