<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" role="img" aria-label="Four steps to draw a 3D box: draw a front square, add equal parallel depth lines from each corner, join the far ends to make the back edges, then shade the top and side to make it solid.">
  <defs>
    <marker id="bah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d6453d"/></marker>
    <style>
      .ink{stroke:#243a7a;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .red{stroke:#d6453d;stroke-width:3;fill:none;stroke-linecap:round}
      .cell{fill:#fffdf5;stroke:#d8cfb0;stroke-width:1.5;stroke-dasharray:2 6}
      .cap{fill:#7c766a;font:600 15px sans-serif}
      .num{fill:#fff;font:700 17px sans-serif}
      .front{fill:#fbf6e8}
      .top{fill:#e7ddbe}
      .side{fill:#d8cca6}
    </style>
  </defs>

  <!-- 1: front square -->
  <g transform="translate(10,10)">
    <rect class="cell" x="3" y="3" width="294" height="244" rx="14"/>
    <circle cx="28" cy="28" r="15" fill="#243a7a"/><text class="num" x="28" y="34" text-anchor="middle">1</text>
    <rect class="front ink" x="95" y="80" width="110" height="110"/>
    <text class="cap" x="150" y="232" text-anchor="middle">Draw a front square</text>
  </g>

  <!-- 2: depth lines -->
  <g transform="translate(330,10)">
    <rect class="cell" x="3" y="3" width="294" height="244" rx="14"/>
    <circle cx="28" cy="28" r="15" fill="#243a7a"/><text class="num" x="28" y="34" text-anchor="middle">2</text>
    <rect class="front ink" x="95" y="80" width="110" height="110"/>
    <path class="red" d="M95,80 L135,48" marker-end="url(#bah)"/>
    <path class="red" d="M205,80 L245,48" marker-end="url(#bah)"/>
    <path class="red" d="M205,190 L245,158" marker-end="url(#bah)"/>
    <text class="cap" x="150" y="232" text-anchor="middle">Equal parallel depth lines</text>
  </g>

  <!-- 3: join the back -->
  <g transform="translate(10,280)">
    <rect class="cell" x="3" y="3" width="294" height="244" rx="14"/>
    <circle cx="28" cy="28" r="15" fill="#243a7a"/><text class="num" x="28" y="34" text-anchor="middle">3</text>
    <rect class="front ink" x="95" y="80" width="110" height="110"/>
    <path class="ink" d="M95,80 L135,48 M205,80 L245,48 M205,190 L245,158"/>
    <path class="ink" d="M135,48 L245,48 L245,158"/>
    <text class="cap" x="150" y="232" text-anchor="middle">Join the far ends</text>
  </g>

  <!-- 4: shaded cube -->
  <g transform="translate(330,280)">
    <rect class="cell" x="3" y="3" width="294" height="244" rx="14"/>
    <circle cx="28" cy="28" r="15" fill="#243a7a"/><text class="num" x="28" y="34" text-anchor="middle">4</text>
    <path class="top" d="M95,80 L135,48 L245,48 L205,80 Z"/>
    <path class="side" d="M205,80 L245,48 L245,158 L205,190 Z"/>
    <rect class="front" x="95" y="80" width="110" height="110"/>
    <path class="ink" d="M95,80 L205,80 L205,190 L95,190 Z M95,80 L135,48 L245,48 L205,80 M205,80 L245,48 M245,48 L245,158 L205,190"/>
    <text class="cap" x="150" y="232" text-anchor="middle">Shade the top &amp; side</text>
  </g>
</svg>
