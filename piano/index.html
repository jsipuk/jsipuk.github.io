<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Aria — Piano Practice</title>
  <meta name="description" content="Learn piano with scrolling sheet music and a falling-note visualiser.">
  <meta name="theme-color" content="#10141d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aria">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">ARIA <span>piano practice</span></div>

      <select id="song-select" aria-label="Choose a song"></select>

      <button id="import-btn" class="btn" aria-label="Import MusicXML file">Import</button>
      <input id="file-input" type="file" accept=".xml,.musicxml,.mxl" hidden>

      <div class="transport">
        <button id="play" class="btn primary" aria-label="Play">▶</button>
        <button id="reset" class="btn" aria-label="Restart">⟲</button>
      </div>

      <div class="hands-group" role="group" aria-label="Hands to practise">
        <button class="seg active" data-hand="both">Both</button>
        <button class="seg seg-r" data-hand="R">Right</button>
        <button class="seg seg-l" data-hand="L">Left</button>
      </div>

      <div class="speed-group">
        <span>Speed</span>
        <input id="speed" type="range" min="0.25" max="1.5" step="0.05" value="1" aria-label="Playback speed">
        <span id="speed-label">100%</span>
      </div>

      <div class="toggles">
        <label><input id="toggle-names" type="checkbox" checked> Note names</label>
        <label><input id="toggle-fingers" type="checkbox" checked> Fingers</label>
        <label><input id="toggle-sound" type="checkbox" checked> Sound</label>
      </div>
    </header>

    <section class="sheet-panel" aria-label="Sheet music">
      <canvas id="sheet"></canvas>
    </section>

    <section class="fall-panel" aria-label="Falling notes and keyboard">
      <canvas id="fall"></canvas>
    </section>
  </div>

  <div id="toast" role="status"></div>

  <script src="songs.js"></script>
  <script src="musicxml.js"></script>
  <script src="app.js"></script>
</body>
</html>
